<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// SEEDED RANDOM
// ============================================================
class SeededRandom {
    constructor(seed) {
        this.seed = seed % 2147483647;
        if (this.seed <= 0) this.seed += 2147483646;
    }
    next() { this.seed = (this.seed * 16807) % 2147483647; return (this.seed - 1) / 2147483646; }
    nextInt(min, max) { return Math.floor(this.next() * (max - min + 1)) + min; }
    nextFloat(min, max) { return this.next() * (max - min) + min; }
    pick(arr) { return arr[Math.floor(this.next() * arr.length)]; }
    weightedPick(items) {
        const total = items.reduce((s, i) => s + i.frequency, 0);
        let r = this.next() * total;
        for (const item of items) { r -= item.frequency; if (r <= 0) return item; }
        return items[items.length - 1];
    }
    gaussian() {
        const u1 = this.next(), u2 = this.next();
        return Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
    }
}

// ============================================================
// CONSTANTS
// ============================================================
const GALAXY_VIEW_TYPES = [
    { id: 'spiral',     arms: [2,6],  systemCount: [200,500] },
    { id: 'barred',     arms: [2,4],  systemCount: [300,600] },
    { id: 'elliptical', arms: [0,0],  systemCount: [150,400] },
    { id: 'irregular',  arms: [0,0],  systemCount: [80,200] },
];
const GALAXY_VISUAL_TYPES = [
    { id: 'spiral',     name: 'Spiral Galaxy',    color: '#88aaff', glowColor: '#4466cc' },
    { id: 'barred',     name: 'Barred Spiral',    color: '#99bbff', glowColor: '#5577dd' },
    { id: 'elliptical', name: 'Elliptical Galaxy', color: '#ffcc88', glowColor: '#cc9944' },
    { id: 'irregular',  name: 'Irregular Galaxy',  color: '#aaddaa', glowColor: '#66aa66' },
];
const GALAXY_NAMES_PREFIX = ['Andromeda','Celestia','Draconis','Elysia','Fornax','Galactica','Helios','Icarus','Jotunheim','Kronos','Lyra','Mithras','Nebula','Orion','Pandora','Quasar','Regulus','Solara','Tethys','Umbra','Valhalla','Wyrm','Xanadu','Yggdrasil','Zenith'];
const GALAXY_NAMES_SUFFIX = ['Expanse','Cluster','Nexus','Void','Reach','Dominion','Sector','Spiral','Drift','Wake'];
const QUASAR_PREFIX = ['QSO','3C','PKS','SDSS','IRAS','Mrk','NGC','PG','HE','HS','LBQS','APM'];
const QUASAR_SUFFIX = ['Alpha','Beta','Gamma','Delta','Prime','Major','Nova','Flux','Blazar','Lux','Core','Apex'];
const QUASAR_TYPES = [
    { id: 'radio_loud',  name: 'Radio-Loud Quasar',  color: '#ffdd44', jetColor: '#ff8800', frequency: 0.3 },
    { id: 'radio_quiet', name: 'Radio-Quiet Quasar',  color: '#eedd88', jetColor: '#ccaa44', frequency: 0.4 },
    { id: 'blazar',      name: 'Blazar',               color: '#ff9944', jetColor: '#ff4400', frequency: 0.15 },
    { id: 'seyfert',     name: 'Seyfert Nucleus',      color: '#ddbb66', jetColor: '#aa8844', frequency: 0.15 },
];
const CLUSTER_PREFIX = ['Abell','Coma','Perseus','Virgo','Centaurus','Hydra','Ophiuchus','Hercules','Norma','Fornax','Phoenix','Sculptor','Antlia','Boötes','Sagitta','Pavo','Dorado','Horologium'];
const CLUSTER_SUFFIX = ['Cluster','Supercluster','Group','Aggregate','Formation','Complex','Assembly','Convergence'];
const UNI_PREFIX = ['Eternal','Infinite','Primordial','Celestial','Cosmic','Astral','Grand','Boundless','Vast','Ancient','Luminous','Sovereign','Twilight','Radiant','Abyssal'];
const UNI_SUFFIX = ['Expanse','Continuum','Dominion','Realm','Tapestry','Lattice','Web','Horizon','Matrix','Firmament'];

// ============================================================
// UNIVERSE DENSITY
// ============================================================
let universeDensity = 1.0;

// ============================================================
// PEEK GALAXY PROPERTIES (matches galaxy_view.html RNG sequence)
// ============================================================
function peekGalaxyProperties(galaxySeed) {
    const rng = new SeededRandom(galaxySeed);
    const typeIndex = rng.nextInt(0, GALAXY_VIEW_TYPES.length - 1);
    const gvType = GALAXY_VIEW_TYPES[typeIndex];
    const name = rng.pick(GALAXY_NAMES_PREFIX) + ' ' + rng.pick(GALAXY_NAMES_SUFFIX);
    const armCount = gvType.arms[0] === 0 ? 0 : rng.nextInt(gvType.arms[0], gvType.arms[1]);
    const baseSystemCount = rng.nextInt(gvType.systemCount[0], gvType.systemCount[1]);
    const systemCount = Math.round(baseSystemCount * universeDensity);
    const smbhMass = rng.nextFloat(1, 40);
    const smbhActive = rng.next() < 0.3;
    return {
        type: GALAXY_VISUAL_TYPES[typeIndex], name, armCount, systemCount, baseSystemCount,
        smbhMass, smbhActive, smbhName: name.split(' ')[0] + ' Singularity'
    };
}

// ============================================================
// WORMHOLE HELPERS
// ============================================================
const WORMHOLE_NAME_PREFIXES = ['Nexus','Void','Rift','Gate','Passage','Breach','Fold','Tear','Drift','Maw'];
const WORMHOLE_NAME_SUFFIXES = ['Alpha','Omega','Prime','Zero','Deep','Far','Beyond','Null','Apex','Lux'];

function generateWormholeDestName(wseed) {
    const rng = new SeededRandom(wseed);
    return rng.pick(WORMHOLE_NAME_PREFIXES) + ' ' + rng.pick(WORMHOLE_NAME_SUFFIXES);
}

function createWormholeTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 128;
    canvas.height = 128;
    const ctx = canvas.getContext('2d');
    const cx = 64, cy = 64;
    ctx.clearRect(0, 0, 128, 128);

    for (let ring = 0; ring < 8; ring++) {
        const r = 6 + ring * 7;
        const alpha = Math.max(0, 0.7 - ring * 0.08);
        const hue = 170 + ring * 15;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.strokeStyle = `hsla(${hue}, 90%, 65%, ${alpha})`;
        ctx.lineWidth = 3;
        ctx.stroke();
    }

    const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 20);
    coreGrad.addColorStop(0, 'rgba(200,255,255,0.9)');
    coreGrad.addColorStop(0.5, 'rgba(100,255,220,0.4)');
    coreGrad.addColorStop(1, 'rgba(50,200,180,0)');
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, 20, 0, Math.PI * 2);
    ctx.fill();

    const outerGrad = ctx.createRadialGradient(cx, cy, 30, cx, cy, 64);
    outerGrad.addColorStop(0, 'rgba(100,200,255,0.2)');
    outerGrad.addColorStop(0.5, 'rgba(180,100,255,0.1)');
    outerGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = outerGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, 64, 0, Math.PI * 2);
    ctx.fill();

    return new THREE.CanvasTexture(canvas);
}

function createQuasarTexture() {
    const size = 192;
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    const cx = size / 2, cy = size / 2;
    ctx.clearRect(0, 0, size, size);

    // Multi-colored outer halo — violet to orange gradient
    const outerGrad = ctx.createRadialGradient(cx, cy, 6, cx, cy, 90);
    outerGrad.addColorStop(0, 'rgba(255,220,140,0.5)');
    outerGrad.addColorStop(0.15, 'rgba(255,160,60,0.3)');
    outerGrad.addColorStop(0.35, 'rgba(200,80,180,0.12)');
    outerGrad.addColorStop(0.6, 'rgba(100,60,200,0.05)');
    outerGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = outerGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, 90, 0, Math.PI * 2);
    ctx.fill();

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';

    // Color-shifting spikes: each spike a different hue (rainbow quasar)
    const spikeColors = [
        ['rgba(255,255,255,1.0)', 'rgba(255,200,80,0.5)',  'rgba(255,120,20,0.1)'],  // gold
        ['rgba(255,255,255,1.0)', 'rgba(200,140,255,0.5)', 'rgba(120,60,200,0.1)'],  // violet
        ['rgba(255,255,255,1.0)', 'rgba(100,200,255,0.5)', 'rgba(40,100,220,0.1)'],  // blue
        ['rgba(255,255,255,1.0)', 'rgba(255,180,100,0.5)', 'rgba(220,80,40,0.1)'],   // orange
        ['rgba(255,255,255,1.0)', 'rgba(180,255,140,0.4)', 'rgba(60,200,80,0.08)'],  // green
        ['rgba(255,255,255,1.0)', 'rgba(255,140,180,0.5)', 'rgba(200,40,100,0.1)'],  // pink
    ];

    for (let spike = 0; spike < 6; spike++) {
        const angle = spike * Math.PI / 3 + Math.PI / 6;
        const len = 85;
        const dx = Math.cos(angle), dy = Math.sin(angle);
        const colors = spikeColors[spike];

        // Main spike
        const spikeGrad = ctx.createLinearGradient(cx, cy, cx + dx * len, cy + dy * len);
        spikeGrad.addColorStop(0, colors[0]);
        spikeGrad.addColorStop(0.2, colors[1]);
        spikeGrad.addColorStop(0.6, colors[2]);
        spikeGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.strokeStyle = spikeGrad;
        ctx.lineWidth = 3.5;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + dx * len, cy + dy * len);
        ctx.stroke();

        // Secondary thinner spike (slightly offset for sparkle)
        const a2 = angle + 0.08;
        ctx.strokeStyle = spikeGrad;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a2) * len * 0.6, cy + Math.sin(a2) * len * 0.6);
        ctx.stroke();
    }

    // Two dominant jet spikes (vertical-ish, extra bright)
    for (let j = 0; j < 2; j++) {
        const angle = j * Math.PI + Math.PI / 2; // top and bottom
        const len = 90;
        const dx = Math.cos(angle), dy = Math.sin(angle);
        const jetGrad = ctx.createLinearGradient(cx, cy, cx + dx * len, cy + dy * len);
        jetGrad.addColorStop(0, 'rgba(255,255,255,1.0)');
        jetGrad.addColorStop(0.1, 'rgba(255,200,120,0.8)');
        jetGrad.addColorStop(0.3, 'rgba(100,160,255,0.4)');
        jetGrad.addColorStop(0.6, 'rgba(80,60,200,0.15)');
        jetGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.strokeStyle = jetGrad;
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + dx * len, cy + dy * len);
        ctx.stroke();
    }
    ctx.restore();

    // Blazing multi-ring core: white → gold → orange → violet
    const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 18);
    coreGrad.addColorStop(0, 'rgba(255,255,255,1.0)');
    coreGrad.addColorStop(0.2, 'rgba(255,240,200,0.95)');
    coreGrad.addColorStop(0.4, 'rgba(255,180,80,0.7)');
    coreGrad.addColorStop(0.65, 'rgba(200,100,200,0.3)');
    coreGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, 18, 0, Math.PI * 2);
    ctx.fill();

    return new THREE.CanvasTexture(canvas);
}


// ============================================================
// COSMIC WEB (MST + extra edges) — 3D
// ============================================================
function buildCosmicWeb(clusters, rng) {
    const n = clusters.length;
    if (n <= 1) return [];
    const inMST = new Array(n).fill(false);
    const edges = [];
    inMST[0] = true;
    for (let step = 0; step < n - 1; step++) {
        let bestDist = Infinity, bestFrom = -1, bestTo = -1;
        for (let i = 0; i < n; i++) {
            if (!inMST[i]) continue;
            for (let j = 0; j < n; j++) {
                if (inMST[j]) continue;
                const dx = clusters[i].x - clusters[j].x;
                const dy = clusters[i].y - clusters[j].y;
                const dz = clusters[i].z - clusters[j].z;
                const d = Math.sqrt(dx*dx + dy*dy + dz*dz);
                if (d < bestDist) { bestDist = d; bestFrom = i; bestTo = j; }
            }
        }
        if (bestTo >= 0) { inMST[bestTo] = true; edges.push([bestFrom, bestTo]); }
    }
    const edgeSet = new Set(edges.map(e => `${Math.min(e[0],e[1])}-${Math.max(e[0],e[1])}`));
    const cands = [];
    for (let i = 0; i < n; i++) {
        for (let j = i + 1; j < n; j++) {
            if (!edgeSet.has(`${i}-${j}`)) {
                const dx = clusters[i].x - clusters[j].x;
                const dy = clusters[i].y - clusters[j].y;
                const dz = clusters[i].z - clusters[j].z;
                cands.push({ from: i, to: j, dist: Math.sqrt(dx*dx + dy*dy + dz*dz) });
            }
        }
    }
    cands.sort((a, b) => a.dist - b.dist);
    const extra = Math.ceil(edges.length * 0.4);
    for (let i = 0; i < Math.min(extra, cands.length); i++) edges.push([cands[i].from, cands[i].to]);
    return edges;
}

// ============================================================
// UNIVERSE GENERATION — 3D
// ============================================================
function generateUniverse(seed) {
    const rng = new SeededRandom(seed);
    const universeName = rng.pick(UNI_PREFIX) + ' ' + rng.pick(UNI_SUFFIX);
    const universeId = `UNI-${String(seed).padStart(4, '0')}`;
    const universeRadius = 700;

    // Cluster centers — oblate disc distribution (Y flattened to 30%)
    const flattenY = 0.55;
    const clusterCount = rng.nextInt(14, 28);
    const clusters = [];
    for (let i = 0; i < clusterCount; i++) {
        let cx, cy, cz, valid, attempts = 0;
        do {
            cx = rng.nextFloat(-universeRadius * 0.95, universeRadius * 0.95);
            cy = rng.nextFloat(-universeRadius * 0.95, universeRadius * 0.95) * flattenY;
            cz = rng.nextFloat(-universeRadius * 0.95, universeRadius * 0.95);
            valid = true;
            for (const e of clusters) {
                if (Math.sqrt((cx-e.x)**2 + (cy-e.y)**2 + (cz-e.z)**2) < 160) { valid = false; break; }
            }
            attempts++;
        } while (!valid && attempts < 80);
        clusters.push({
            x: cx, y: cy, z: cz,
            name: rng.pick(CLUSTER_PREFIX) + ' ' + rng.pick(CLUSTER_SUFFIX),
            id: `${universeId}:CL-${String(i).padStart(2, '0')}`,
            galaxyCount: rng.nextInt(3, 9),
            radius: rng.nextFloat(100, 220),
            index: i
        });
    }

    const edges = buildCosmicWeb(clusters, rng);
    const galaxies = [];
    let galIdx = 0;

    // Cluster galaxies — oblate disc distribution (scaled by density)
    for (const cluster of clusters) {
        const scaledGalCount = Math.max(1, Math.round(cluster.galaxyCount * universeDensity));
        for (let g = 0; g < scaledGalCount; g++) {
            const theta = rng.nextFloat(0, Math.PI * 2);
            const phi = Math.acos(rng.nextFloat(-1, 1));
            const dist = Math.abs(rng.gaussian()) * cluster.radius * 0.7;
            const galaxySeed = rng.nextInt(1, 999999);
            const props = peekGalaxyProperties(galaxySeed);
            galaxies.push({
                x: cluster.x + Math.sin(phi) * Math.cos(theta) * dist,
                y: cluster.y + Math.cos(phi) * dist * flattenY,
                z: cluster.z + Math.sin(phi) * Math.sin(theta) * dist,
                seed: galaxySeed, type: props.type, name: props.name, props,
                id: `${universeId}:GAL-${String(galIdx).padStart(3, '0')}`,
                cluster, isField: false,
                size: rng.nextFloat(10, 20),
                angle: rng.nextFloat(0, Math.PI * 2),
                index: galIdx
            });
            galIdx++;
        }
    }

    // Filament galaxies — along edges in 3D (scaled by density)
    for (const edge of edges) {
        const c1 = clusters[edge[0]], c2 = clusters[edge[1]];
        const baseFilCount = rng.nextInt(1, 6);
        const filCount = Math.round(baseFilCount * universeDensity);
        for (let f = 0; f < filCount; f++) {
            const t = rng.nextFloat(0.2, 0.8);
            // 3D perpendicular offset via cross product with random vector
            const edx = c2.x - c1.x, edy = c2.y - c1.y, edz = c2.z - c1.z;
            const rx = rng.gaussian(), ry = rng.gaussian(), rz = rng.gaussian();
            let px = edy*rz - edz*ry, py = edz*rx - edx*rz, pz = edx*ry - edy*rx;
            const pLen = Math.sqrt(px*px + py*py + pz*pz) || 1;
            const perpDist = rng.gaussian() * 45;
            px = (px/pLen) * perpDist; py = (py/pLen) * perpDist; pz = (pz/pLen) * perpDist;
            const galaxySeed = rng.nextInt(1, 999999);
            const props = peekGalaxyProperties(galaxySeed);
            galaxies.push({
                x: c1.x + edx*t + px, y: c1.y + edy*t + py, z: c1.z + edz*t + pz,
                seed: galaxySeed, type: props.type, name: props.name, props,
                id: `${universeId}:GAL-${String(galIdx).padStart(3, '0')}`,
                cluster: null, isField: true,
                size: rng.nextFloat(7, 15), angle: rng.nextFloat(0, Math.PI * 2), index: galIdx
            });
            galIdx++;
        }
    }

    // Field galaxies — scattered in void (scaled by density, Y flattened)
    const baseFieldCount = rng.nextInt(30, 60);
    const fieldCount = Math.max(1, Math.round(baseFieldCount * universeDensity));
    for (let f = 0; f < fieldCount; f++) {
        const galaxySeed = rng.nextInt(1, 999999);
        const props = peekGalaxyProperties(galaxySeed);
        galaxies.push({
            x: rng.nextFloat(-universeRadius*0.9, universeRadius*0.9),
            y: rng.nextFloat(-universeRadius*0.9, universeRadius*0.9) * flattenY,
            z: rng.nextFloat(-universeRadius*0.9, universeRadius*0.9),
            seed: galaxySeed, type: props.type, name: props.name, props,
            id: `${universeId}:GAL-${String(galIdx).padStart(3, '0')}`,
            cluster: null, isField: true,
            size: rng.nextFloat(5, 12), angle: rng.nextFloat(0, Math.PI * 2), index: galIdx
        });
        galIdx++;
    }

    // ---- Universe wormholes (separate RNG) ----
    const whRng = new SeededRandom(seed * 37 + 17);
    const universeWormholes = [];
    const uWhCount = whRng.nextInt(2, 5);
    for (let wi = 0; wi < uWhCount; wi++) {
        // Pick two different galaxies to connect
        const nearIdx = whRng.nextInt(0, galaxies.length - 1);
        let destIdx = whRng.nextInt(0, galaxies.length - 1);
        if (destIdx === nearIdx) destIdx = (destIdx + 1) % galaxies.length;
        const nearGal = galaxies[nearIdx];
        const destGal = galaxies[destIdx];

        // Position endpoints near (but not on) their galaxies
        const offset = 25;
        universeWormholes.push({
            x1: nearGal.x + whRng.nextFloat(-offset, offset),
            y1: nearGal.y + whRng.nextFloat(-offset * 0.3, offset * 0.3),
            z1: nearGal.z + whRng.nextFloat(-offset, offset),
            x2: destGal.x + whRng.nextFloat(-offset, offset),
            y2: destGal.y + whRng.nextFloat(-offset * 0.3, offset * 0.3),
            z2: destGal.z + whRng.nextFloat(-offset, offset),
            nearGalaxyIndex: nearIdx,
            destGalaxyIndex: destIdx,
            id: 'UWH-' + wi,
            name: generateWormholeDestName(whRng.nextInt(1, 999999))
        });
    }

    // ---- Quasars (associated with AGN galaxies) ----
    const qRng = new SeededRandom(seed * 53 + 31);
    const quasars = [];
    const agnGalaxies = galaxies.filter(g => g.props && g.props.smbhActive);
    for (let qi = 0; qi < agnGalaxies.length; qi++) {
        // ~25% of AGN galaxies host a visible quasar
        if (qRng.next() > 0.25) continue;
        const hostGal = agnGalaxies[qi];
        const qType = qRng.weightedPick(QUASAR_TYPES);
        const designation = qRng.pick(QUASAR_PREFIX) + ' ' + qRng.pick(QUASAR_SUFFIX);
        const luminosity = qRng.nextFloat(10, 1000); // in 10^12 solar luminosities
        const redshift = qRng.nextFloat(0.05, 4.0);
        const jetLength = qType.id === 'blazar' ? qRng.nextFloat(20, 40) : qRng.nextFloat(8, 20);
        // Quasar position slightly offset from galaxy center
        const qOff = 3;
        quasars.push({
            x: hostGal.x + qRng.nextFloat(-qOff, qOff),
            y: hostGal.y + qRng.nextFloat(-qOff * 0.3, qOff * 0.3),
            z: hostGal.z + qRng.nextFloat(-qOff, qOff),
            hostGalaxyIndex: hostGal.index,
            hostGalaxyName: hostGal.name,
            type: qType,
            name: designation,
            luminosity,
            redshift,
            jetLength,
            jetAngle: qRng.nextFloat(0, Math.PI * 2),
            jetTilt: qRng.nextFloat(-0.5, 0.5),
            id: `QSR-${String(quasars.length).padStart(2, '0')}`,
            index: quasars.length
        });
        hostGal.hasQuasar = true;
        hostGal.quasarIndex = quasars.length - 1;
    }

    return { name: universeName, id: universeId, seed, clusters, galaxies, edges, universeRadius, universeWormholes, quasars };
}

// ============================================================
// GALAXY TEXTURES (canvas-drawn sprites per type)
// ============================================================
// ---- Per-galaxy unique procedural textures ----
function createUniqueGalaxyTexture(galaxySeed, typeId) {
    const rng = new SeededRandom(galaxySeed);
    const size = 128;
    const c = document.createElement('canvas');
    c.width = size; c.height = size;
    const ctx = c.getContext('2d');
    const cx = size / 2, cy = size / 2, maxR = size / 2;

    // --- Multi-color palette system: each galaxy picks 2-3 colors and blends between them ---
    // Arms get blue/young-star colors, cores get warm/old-star colors, regions get unique tints
    const spiralPalettes = [
        { arm: [[0.4,0.55,1.0],[0.3,0.6,0.95]], core: [1.0,0.88,0.6], dust: [0.15,0.08,0.03], hii: [1.0,0.3,0.5] },
        { arm: [[0.5,0.7,1.0],[0.35,0.5,0.9]],  core: [1.0,0.92,0.7], dust: [0.12,0.06,0.02], hii: [0.4,0.8,1.0] },
        { arm: [[0.6,0.75,1.0],[0.45,0.65,1.0]], core: [1.0,0.85,0.55], dust: [0.18,0.1,0.04], hii: [1.0,0.5,0.8] },
        { arm: [[0.55,0.8,0.95],[0.4,0.7,0.85]], core: [1.0,0.9,0.65], dust: [0.1,0.07,0.03], hii: [0.3,1.0,0.6] },
        { arm: [[0.7,0.6,1.0],[0.5,0.4,0.95]],   core: [1.0,0.82,0.5], dust: [0.2,0.1,0.05], hii: [1.0,0.4,0.3] },
        { arm: [[0.4,0.9,0.9],[0.3,0.7,0.8]],     core: [0.95,0.85,0.6], dust: [0.08,0.12,0.06], hii: [0.9,0.3,1.0] },
    ];
    const ellipticalPalettes = [
        { inner: [1.0,0.85,0.55], outer: [0.9,0.7,0.4], accent: [0.7,0.6,0.45] },
        { inner: [1.0,0.9,0.7],   outer: [0.85,0.65,0.4], accent: [0.6,0.55,0.5] },
        { inner: [1.0,0.8,0.5],   outer: [0.95,0.75,0.5], accent: [0.8,0.7,0.55] },
        { inner: [0.95,0.88,0.75],outer: [0.8,0.6,0.35], accent: [0.65,0.5,0.4] },
    ];
    const irregularPalettes = [
        { blobs: [[0.4,0.7,1.0],[0.9,0.4,0.6],[0.3,0.9,0.5]], hii: [1.0,0.3,0.5] },
        { blobs: [[0.5,0.9,0.8],[1.0,0.7,0.3],[0.6,0.4,1.0]], hii: [0.3,0.8,1.0] },
        { blobs: [[0.8,0.5,1.0],[0.3,1.0,0.7],[1.0,0.9,0.4]], hii: [1.0,0.5,0.2] },
        { blobs: [[0.3,0.6,0.9],[0.7,0.9,0.4],[0.9,0.5,0.7]], hii: [0.5,1.0,0.8] },
    ];

    // Helper: make rgba string from [r,g,b] (0-1) and alpha
    const rgba = (rgb, a) => `rgba(${Math.floor(rgb[0]*255)},${Math.floor(rgb[1]*255)},${Math.floor(rgb[2]*255)},${a})`;
    // Helper: lerp two colors
    const lerpCol = (c1, c2, t) => c1.map((v, i) => v + (c2[i] - v) * t);
    // Helper: jitter a color
    const jitterCol = (rgb, amount) => rgb.map(v => Math.min(1, Math.max(0, v + (rng.next() - 0.5) * amount)));

    // Rotation angle — unique tilt per galaxy
    const rotation = rng.next() * Math.PI * 2;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rotation);
    ctx.translate(-cx, -cy);

    if (typeId === 'spiral' || typeId === 'barred') {
        const pal = spiralPalettes[Math.floor(rng.next() * spiralPalettes.length)];
        const armCol1 = jitterCol(pal.arm[0], 0.12);
        const armCol2 = jitterCol(pal.arm[1], 0.12);
        const coreCol = jitterCol(pal.core, 0.1);
        const dustCol = jitterCol(pal.dust, 0.05);
        const hiiCol = jitterCol(pal.hii, 0.15);

        const armCount = typeId === 'barred' ? 2 : (2 + Math.floor(rng.next() * 3));
        const tightness = 2.5 + rng.next() * 2.5;
        const ellip = 0.55 + rng.next() * 0.45;
        // Per-galaxy: some have prominent dust lanes, some don't
        const hasDustLanes = rng.next() > 0.35;
        // Per-galaxy: arm color gradient strength (blue outer, warm inner)
        const armGradientStrength = 0.5 + rng.next() * 0.5;

        // Diffuse background disc — gradient from warm core to cool outer
        const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR);
        glow.addColorStop(0, rgba(lerpCol(coreCol, armCol1, 0.3), 0.3));
        glow.addColorStop(0.2, rgba(lerpCol(coreCol, armCol1, 0.6), 0.15));
        glow.addColorStop(0.5, rgba(armCol1, 0.06));
        glow.addColorStop(0.8, rgba(armCol2, 0.02));
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glow;
        ctx.beginPath(); ctx.ellipse(cx, cy, maxR, maxR * ellip, 0, 0, Math.PI * 2); ctx.fill();

        // Spiral arms — color shifts from warm (inner) to blue (outer)
        for (let arm = 0; arm < armCount; arm++) {
            const startAngle = (arm / armCount) * Math.PI * 2 + rng.next() * 0.3;
            // Each arm can have a slight color personality
            const armTint = jitterCol(armCol1, 0.08);
            for (let i = 0; i < 350; i++) {
                const t = rng.next();
                const r = t * maxR * 0.92;
                const a = startAngle + t * tightness;
                const spread = (0.02 + t * 0.07) * maxR;
                const perpAngle = a + Math.PI / 2;
                const scatter = (rng.next() - 0.5) * 2 * spread;
                const px = cx + Math.cos(a) * r + Math.cos(perpAngle) * scatter;
                const py = cy + (Math.sin(a) * r + Math.sin(perpAngle) * scatter) * ellip;
                // Color gradient along arm: warm near core → blue at tip
                const armBlend = t * armGradientStrength;
                const starCol = lerpCol(lerpCol(coreCol, armTint, 0.3 + armBlend * 0.7), armCol2, armBlend);
                const bright = (1 - t) * 0.6 + 0.4;
                const dotR = 0.8 + rng.next() * 2.8;
                const alpha = bright * (0.12 + rng.next() * 0.22);
                ctx.fillStyle = rgba(starCol, alpha);
                ctx.beginPath(); ctx.arc(px, py, dotR, 0, Math.PI * 2); ctx.fill();
            }

            // Dust lanes — dark streaks on the inner (trailing) edge of each arm
            if (hasDustLanes) {
                for (let i = 0; i < 120; i++) {
                    const t = 0.15 + rng.next() * 0.65;
                    const r = t * maxR * 0.85;
                    const a = startAngle + t * tightness;
                    // Offset to trailing edge
                    const perpAngle = a + Math.PI / 2;
                    const offset = -(2 + rng.next() * 3); // inner side
                    const px = cx + Math.cos(a) * r + Math.cos(perpAngle) * offset;
                    const py = cy + (Math.sin(a) * r + Math.sin(perpAngle) * offset) * ellip;
                    const dustAlpha = 0.06 + rng.next() * 0.1;
                    ctx.fillStyle = rgba(dustCol, dustAlpha);
                    ctx.beginPath(); ctx.arc(px, py, 1.5 + rng.next() * 3, 0, Math.PI * 2); ctx.fill();
                }
            }
        }

        // Inter-arm scatter — faint, diverse colors
        for (let i = 0; i < 180; i++) {
            const angle = rng.next() * Math.PI * 2;
            const r = Math.sqrt(rng.next()) * maxR * 0.78;
            const px = cx + Math.cos(angle) * r;
            const py = cy + Math.sin(angle) * r * ellip;
            const scatterCol = lerpCol(coreCol, armCol2, r / (maxR * 0.78));
            ctx.fillStyle = rgba(jitterCol(scatterCol, 0.1), 0.03 + rng.next() * 0.06);
            ctx.beginPath(); ctx.arc(px, py, 0.6 + rng.next() * 1.8, 0, Math.PI * 2); ctx.fill();
        }

        // Barred: central bar — warm golden
        if (typeId === 'barred') {
            const barLen = maxR * (0.25 + rng.next() * 0.15);
            const barW = maxR * 0.07;
            const barAngle = rng.next() * Math.PI;
            const barCol = lerpCol(coreCol, [1, 0.9, 0.6], 0.5);
            for (let i = 0; i < 140; i++) {
                const t = (rng.next() - 0.5) * 2;
                const px = cx + Math.cos(barAngle) * t * barLen + (rng.next() - 0.5) * barW;
                const py = cy + (Math.sin(barAngle) * t * barLen + (rng.next() - 0.5) * barW) * ellip;
                const barStar = jitterCol(barCol, 0.08);
                ctx.fillStyle = rgba(barStar, 0.12 + rng.next() * 0.18);
                ctx.beginPath(); ctx.arc(px, py, 0.8 + rng.next() * 2.2, 0, Math.PI * 2); ctx.fill();
            }
        }

        // Diffuse central bulge — warm golden/amber glow
        const bulgeR = maxR * (0.13 + rng.next() * 0.09);
        const bulgeGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, bulgeR);
        bulgeGlow.addColorStop(0, rgba(coreCol, 0.5));
        bulgeGlow.addColorStop(0.25, rgba(lerpCol(coreCol, armCol1, 0.2), 0.3));
        bulgeGlow.addColorStop(0.6, rgba(lerpCol(coreCol, armCol1, 0.5), 0.1));
        bulgeGlow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = bulgeGlow;
        ctx.beginPath(); ctx.ellipse(cx, cy, bulgeR, bulgeR * ellip, 0, 0, Math.PI * 2); ctx.fill();

        // HII regions (star-forming) — varied colors: pink, blue-white, magenta
        const knotCount = 4 + Math.floor(rng.next() * 6);
        for (let k = 0; k < knotCount; k++) {
            const arm = Math.floor(rng.next() * armCount);
            const t = 0.25 + rng.next() * 0.55;
            const a = (arm / armCount) * Math.PI * 2 + t * tightness;
            const r = t * maxR * 0.88;
            const kx = cx + Math.cos(a) * r + (rng.next() - 0.5) * 8;
            const ky = cy + Math.sin(a) * r * ellip + (rng.next() - 0.5) * 5;
            const kR = 3 + rng.next() * 6;
            // Randomize HII color: pink, blue, magenta, cyan
            const hiiVariant = jitterCol(hiiCol, 0.25);
            const kGlow = ctx.createRadialGradient(kx, ky, 0, kx, ky, kR);
            kGlow.addColorStop(0, rgba(hiiVariant, 0.22 + rng.next() * 0.12));
            kGlow.addColorStop(0.4, rgba(lerpCol(hiiVariant, armCol2, 0.5), 0.1));
            kGlow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = kGlow;
            ctx.beginPath(); ctx.arc(kx, ky, kR, 0, Math.PI * 2); ctx.fill();
        }

        // Occasional bright OB associations — tiny hot blue-white clusters in outer arms
        const obCount = Math.floor(rng.next() * 5);
        for (let o = 0; o < obCount; o++) {
            const arm = Math.floor(rng.next() * armCount);
            const t = 0.5 + rng.next() * 0.4;
            const a = (arm / armCount) * Math.PI * 2 + t * tightness;
            const r = t * maxR * 0.85;
            const ox = cx + Math.cos(a) * r + (rng.next() - 0.5) * 4;
            const oy = cy + Math.sin(a) * r * ellip + (rng.next() - 0.5) * 3;
            ctx.fillStyle = rgba([0.7, 0.85, 1.0], 0.3 + rng.next() * 0.2);
            ctx.beginPath(); ctx.arc(ox, oy, 0.8 + rng.next() * 1.2, 0, Math.PI * 2); ctx.fill();
        }

    } else if (typeId === 'elliptical') {
        const pal = ellipticalPalettes[Math.floor(rng.next() * ellipticalPalettes.length)];
        const innerCol = jitterCol(pal.inner, 0.1);
        const outerCol = jitterCol(pal.outer, 0.1);
        const accentCol = jitterCol(pal.accent, 0.1);
        const ellipX = 0.7 + rng.next() * 0.3;
        const ellipY = 0.4 + rng.next() * 0.35;
        // Some ellipticals have faint shells or tidal features
        const hasShells = rng.next() > 0.6;

        // Smooth radial falloff — color gradient from warm inner to cooler outer
        for (let layer = 0; layer < 4; layer++) {
            const ox = (rng.next() - 0.5) * 5;
            const oy = (rng.next() - 0.5) * 5;
            const layerAlpha = [0.4, 0.25, 0.15, 0.1][layer];
            const layerCol = lerpCol(innerCol, outerCol, layer / 3);
            const glow = ctx.createRadialGradient(cx + ox, cy + oy, 0, cx + ox, cy + oy, maxR * ellipX);
            glow.addColorStop(0, rgba(layerCol, layerAlpha));
            glow.addColorStop(0.25, rgba(lerpCol(layerCol, outerCol, 0.3), layerAlpha * 0.55));
            glow.addColorStop(0.5, rgba(lerpCol(layerCol, outerCol, 0.6), layerAlpha * 0.2));
            glow.addColorStop(0.8, rgba(outerCol, layerAlpha * 0.06));
            glow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = glow;
            ctx.beginPath(); ctx.ellipse(cx + ox, cy + oy, maxR * ellipX, maxR * ellipY, 0, 0, Math.PI * 2); ctx.fill();
        }

        // Faint shell/tidal features — concentric arcs at specific radii
        if (hasShells) {
            const shellCount = 1 + Math.floor(rng.next() * 3);
            for (let s = 0; s < shellCount; s++) {
                const shellR = maxR * (0.35 + rng.next() * 0.4);
                const shellAngle = rng.next() * Math.PI * 2;
                const shellArc = 0.5 + rng.next() * 1.0; // partial arc
                ctx.strokeStyle = rgba(accentCol, 0.06 + rng.next() * 0.06);
                ctx.lineWidth = 2 + rng.next() * 3;
                ctx.beginPath();
                ctx.ellipse(cx, cy, shellR * ellipX, shellR * (ellipY / (ellipX || 1)), 0, shellAngle, shellAngle + shellArc);
                ctx.stroke();
            }
        }

        // Scattered globular cluster dots — varied warm colors
        for (let i = 0; i < 100; i++) {
            const angle = rng.next() * Math.PI * 2;
            const r = Math.pow(rng.next(), 1.5) * maxR * ellipX * 0.85;
            const px = cx + Math.cos(angle) * r;
            const py = cy + Math.sin(angle) * r * (ellipY / ellipX);
            const gcCol = jitterCol(lerpCol(innerCol, accentCol, rng.next()), 0.08);
            ctx.fillStyle = rgba(gcCol, 0.05 + rng.next() * 0.1);
            ctx.beginPath(); ctx.arc(px, py, 0.4 + rng.next() * 1.6, 0, Math.PI * 2); ctx.fill();
        }

        // Warm diffuse core
        const eCoreR = maxR * (0.15 + rng.next() * 0.1);
        const eCoreGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, eCoreR);
        eCoreGlow.addColorStop(0, rgba(innerCol, 0.55));
        eCoreGlow.addColorStop(0.3, rgba(lerpCol(innerCol, outerCol, 0.3), 0.25));
        eCoreGlow.addColorStop(0.7, rgba(outerCol, 0.08));
        eCoreGlow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = eCoreGlow;
        ctx.beginPath(); ctx.ellipse(cx, cy, eCoreR, eCoreR * (ellipY / ellipX), 0, 0, Math.PI * 2); ctx.fill();

    } else {
        // Irregular — multi-colored chaotic blobs
        const pal = irregularPalettes[Math.floor(rng.next() * irregularPalettes.length)];
        const blobColors = pal.blobs.map(c => jitterCol(c, 0.15));
        const hiiCol = jitterCol(pal.hii, 0.15);
        const blobCount = 5 + Math.floor(rng.next() * 5);

        // Faint asymmetric overall glow — off-center
        const glowOx = (rng.next() - 0.5) * maxR * 0.3;
        const glowOy = (rng.next() - 0.5) * maxR * 0.3;
        const glow = ctx.createRadialGradient(cx + glowOx, cy + glowOy, 0, cx + glowOx, cy + glowOy, maxR * 0.75);
        glow.addColorStop(0, rgba(blobColors[0], 0.12));
        glow.addColorStop(0.4, rgba(blobColors[1], 0.05));
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glow; ctx.fillRect(0, 0, size, size);

        for (let b = 0; b < blobCount; b++) {
            const bx = cx + (rng.next() - 0.5) * maxR * 0.95;
            const by = cy + (rng.next() - 0.5) * maxR * 0.75;
            const br = maxR * (0.08 + rng.next() * 0.22);
            // Each blob picks a different color from the palette
            const blobCol = blobColors[b % blobColors.length];
            const blobJitter = jitterCol(blobCol, 0.1);
            for (let d = 0; d < 50; d++) {
                const dx = bx + (rng.next() - 0.5) * br * 2;
                const dy = by + (rng.next() - 0.5) * br * 2;
                const dd = Math.sqrt((dx - bx) ** 2 + (dy - by) ** 2);
                if (dd > br * 1.2) continue;
                const alpha = (1 - dd / (br * 1.2)) * (0.08 + rng.next() * 0.18);
                const dotCol = jitterCol(blobJitter, 0.06);
                ctx.fillStyle = rgba(dotCol, alpha);
                ctx.beginPath(); ctx.arc(dx, dy, 0.8 + rng.next() * 2.2, 0, Math.PI * 2); ctx.fill();
            }
            // Blob diffuse glow in its own color
            const bGlow = ctx.createRadialGradient(bx, by, 0, bx, by, br * 0.9);
            bGlow.addColorStop(0, rgba(blobJitter, 0.16));
            bGlow.addColorStop(0.4, rgba(blobJitter, 0.07));
            bGlow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = bGlow;
            ctx.beginPath(); ctx.arc(bx, by, br * 0.9, 0, Math.PI * 2); ctx.fill();
        }

        // Star-forming knots — diverse bright colors
        for (let k = 0; k < 10; k++) {
            const kx = cx + (rng.next() - 0.5) * maxR * 0.85;
            const ky = cy + (rng.next() - 0.5) * maxR * 0.65;
            const knotCol = jitterCol(rng.next() > 0.5 ? hiiCol : blobColors[Math.floor(rng.next() * blobColors.length)], 0.15);
            ctx.fillStyle = rgba(knotCol, 0.15 + rng.next() * 0.22);
            ctx.beginPath(); ctx.arc(kx, ky, 1.2 + rng.next() * 2.8, 0, Math.PI * 2); ctx.fill();
        }

        // Tidal tail / bridge — faint streamer feature
        if (rng.next() > 0.5) {
            const tailAngle = rng.next() * Math.PI * 2;
            const tailLen = maxR * (0.5 + rng.next() * 0.4);
            const tailCol = jitterCol(blobColors[0], 0.1);
            for (let t = 0; t < 40; t++) {
                const prog = rng.next();
                const tx = cx + Math.cos(tailAngle) * prog * tailLen + (rng.next() - 0.5) * 6;
                const ty = cy + Math.sin(tailAngle) * prog * tailLen + (rng.next() - 0.5) * 6;
                ctx.fillStyle = rgba(tailCol, 0.04 + (1 - prog) * 0.06);
                ctx.beginPath(); ctx.arc(tx, ty, 1 + rng.next() * 2, 0, Math.PI * 2); ctx.fill();
            }
        }
    }

    ctx.restore();

    const tex = new THREE.CanvasTexture(c);
    tex.needsUpdate = true;
    return tex;
}

// ============================================================
// THREE.JS SCENE
// ============================================================
let scene, camera, renderer, raycaster, mouse;
let universeData = null;
let universeGroup = null;
let galaxySprites = [];
let clusterHaloMeshes = [];
let uniWormholeSprites = []; // universe wormhole endpoint sprites
let uniWormholeLines = [];   // connecting lines between endpoints
let quasarSprites = [];       // quasar core sprites
let quasarJetMeshes = [];     // quasar jet line meshes
let selectionRing = null;
let hoverRing = null;
let selectedGalaxyIndex = -1;
let hoveredGalaxyIndex = -1;
let selectedClusterIndex = -1;

// Camera orbit
let camTheta = 0, camPhi = Math.PI / 4, camDist = 1800;
let isDragging = false, dragStartX = 0, dragStartY = 0;
let autoRotate = true, autoRotateTimer = null;

// Smooth camera animation state
let camThetaTarget = 0, camPhiTarget = Math.PI / 4, camDistTarget = 1800;
let isCamAnimating = false;

function initThree() {
    const container = document.getElementById('canvas-container');
    const w = container.clientWidth, h = container.clientHeight;

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x040410);

    camera = new THREE.PerspectiveCamera(50, w / h, 0.01, 10000);
    updateCamera();

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(w, h);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    raycaster = new THREE.Raycaster();
    raycaster.params.Sprite = { threshold: 10 };
    mouse = new THREE.Vector2();

    universeGroup = new THREE.Group();
    scene.add(universeGroup);

    // Selection / hover rings
    const ringGeo = new THREE.RingGeometry(0.85, 1.0, 32);
    const selMat = new THREE.MeshBasicMaterial({ color: 0xcc99ff, side: THREE.DoubleSide, transparent: true, opacity: 0.7, depthWrite: false });
    selectionRing = new THREE.Mesh(ringGeo, selMat);
    selectionRing.visible = false;
    scene.add(selectionRing);

    const hovMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.3, depthWrite: false });
    hoverRing = new THREE.Mesh(ringGeo.clone(), hovMat);
    hoverRing.visible = false;
    scene.add(hoverRing);

    // Starfield background
    createStarfield();

    // Input handlers
    const el = renderer.domElement;
    el.addEventListener('mousedown', onMouseDown);
    el.addEventListener('mousemove', onMouseMove);
    el.addEventListener('mouseup', onMouseUp);
    el.addEventListener('mouseleave', onMouseUp);
    el.addEventListener('wheel', onWheel, { passive: false });
    el.addEventListener('click', onClick);
    el.addEventListener('dblclick', onDblClick);

    window.addEventListener('resize', () => {
        const w = container.clientWidth, h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    });
}

function updateCamera() {
    camera.position.x = camDist * Math.sin(camPhi) * Math.cos(camTheta);
    camera.position.y = camDist * Math.cos(camPhi);
    camera.position.z = camDist * Math.sin(camPhi) * Math.sin(camTheta);
    camera.lookAt(0, 0, 0);
}

function createStarfield() {
    const count = 3000;
    const positions = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
        const r = 3500 + Math.random() * 2000;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
        positions[i*3+1] = r * Math.cos(phi);
        positions[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 1, transparent: true, opacity: 0.35, sizeAttenuation: false });
    scene.add(new THREE.Points(geo, mat));
}

// ============================================================
// BUILD UNIVERSE SCENE
// ============================================================
function clearUniverseScene() {
    while (universeGroup.children.length) {
        const c = universeGroup.children[0];
        universeGroup.remove(c);
        if (c.geometry) c.geometry.dispose();
        if (c.material) { if (c.material.map) c.material.map.dispose(); c.material.dispose(); }
    }
    galaxySprites = [];
    clusterHaloMeshes = [];
    uniWormholeSprites = [];
    uniWormholeLines = [];
    quasarSprites = [];
    quasarJetMeshes = [];
    selectionRing.visible = false;
    hoverRing.visible = false;
}

function buildUniverseScene() {
    if (!universeData) return;
    clearUniverseScene();
    const { clusters, galaxies, edges, universeRadius } = universeData;

    // Cluster halos — invisible but kept for raycasting/click detection
    const haloFlattenY = 0.55;
    for (let ci = 0; ci < clusters.length; ci++) {
        const cl = clusters[ci];
        const haloGeo = new THREE.SphereGeometry(cl.radius, 16, 12);
        const haloMat = new THREE.MeshBasicMaterial({
            color: 0x000000, transparent: true, opacity: 0.0, side: THREE.DoubleSide, depthWrite: false
        });
        const halo = new THREE.Mesh(haloGeo, haloMat);
        halo.position.set(cl.x, cl.y, cl.z);
        halo.scale.set(1, haloFlattenY, 1);
        halo.userData = { clusterIndex: ci };
        universeGroup.add(halo);
        clusterHaloMeshes.push(halo);
    }

    // Galaxy sprites — unique procedural texture per galaxy
    for (let gi = 0; gi < galaxies.length; gi++) {
        const gal = galaxies[gi];
        const tex = createUniqueGalaxyTexture(gal.seed, gal.type.id);
        const mat = new THREE.SpriteMaterial({
            map: tex, transparent: true, depthWrite: false,
            blending: THREE.AdditiveBlending
        });
        const sprite = new THREE.Sprite(mat);
        sprite.position.set(gal.x, gal.y, gal.z);
        const s = gal.size * 1.8;
        sprite.scale.set(s, s, 1);
        sprite.userData = { galaxyIndex: gi };
        universeGroup.add(sprite);
        galaxySprites.push(sprite);
    }

    // ---- Cosmic gas / intergalactic nebulae ----
    {
        const nebRng = new SeededRandom(universeData.seed * 31 + 7);
        const nebulaColors = [
            [0.3, 0.2, 0.6],  // deep violet
            [0.15, 0.25, 0.5], // dark blue
            [0.5, 0.15, 0.3],  // warm magenta
            [0.2, 0.4, 0.5],   // teal
            [0.4, 0.25, 0.15], // warm amber
            [0.1, 0.3, 0.35],  // dark cyan
            [0.35, 0.1, 0.45], // purple
            [0.15, 0.35, 0.2], // deep green
        ];

        // Create a soft noise cloud texture
        function makeCosmicCloudTex(color, rng, size) {
            const c = document.createElement('canvas');
            c.width = size; c.height = size;
            const ctx = c.getContext('2d');
            const cx = size / 2, cy = size / 2, maxR = size / 2;

            // Layer multiple soft radial blobs at random offsets for organic shape
            const blobCount = 5 + Math.floor(rng.next() * 6);
            for (let b = 0; b < blobCount; b++) {
                const bx = cx + (rng.next() - 0.5) * size * 0.5;
                const by = cy + (rng.next() - 0.5) * size * 0.5;
                const br = maxR * (0.3 + rng.next() * 0.5);
                const grad = ctx.createRadialGradient(bx, by, 0, bx, by, br);
                const a = 0.03 + rng.next() * 0.04;
                grad.addColorStop(0, `rgba(${Math.floor(color[0]*255)},${Math.floor(color[1]*255)},${Math.floor(color[2]*255)},${a})`);
                grad.addColorStop(0.4, `rgba(${Math.floor(color[0]*255)},${Math.floor(color[1]*255)},${Math.floor(color[2]*255)},${a*0.5})`);
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, size, size);
            }
            const tex = new THREE.CanvasTexture(c);
            tex.needsUpdate = true;
            return tex;
        }

        // Large-scale cosmic gas washes — near clusters and filaments
        // Cluster-associated nebulae
        for (let ci = 0; ci < clusters.length; ci++) {
            const cl = clusters[ci];
            const cloudCount = 2 + Math.floor(nebRng.next() * 3);
            for (let n = 0; n < cloudCount; n++) {
                const color = nebulaColors[Math.floor(nebRng.next() * nebulaColors.length)];
                // Brighten slightly
                const bc = color.map(c => Math.min(1, c * (1.0 + nebRng.next() * 0.4)));
                const tex = makeCosmicCloudTex(bc, nebRng, 256);
                const mat = new THREE.SpriteMaterial({
                    map: tex, transparent: true,
                    opacity: 0.4 + nebRng.next() * 0.3,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false,
                    rotation: nebRng.next() * Math.PI * 2
                });
                const sprite = new THREE.Sprite(mat);
                // Position near cluster with some offset
                const ox = (nebRng.next() - 0.5) * cl.radius * 1.5;
                const oy = (nebRng.next() - 0.5) * cl.radius * 0.6;
                const oz = (nebRng.next() - 0.5) * cl.radius * 1.5;
                sprite.position.set(cl.x + ox, cl.y + oy, cl.z + oz);
                const cloudSize = cl.radius * (0.8 + nebRng.next() * 1.2);
                sprite.scale.set(cloudSize, cloudSize, 1);
                universeGroup.add(sprite);
            }
        }

        // Filament-associated gas — along edges between clusters
        for (const edge of edges) {
            const c1 = clusters[edge[0]], c2 = clusters[edge[1]];
            const filClouds = 1 + Math.floor(nebRng.next() * 3);
            for (let fc = 0; fc < filClouds; fc++) {
                const t = 0.15 + nebRng.next() * 0.7;
                const color = nebulaColors[Math.floor(nebRng.next() * nebulaColors.length)];
                const tex = makeCosmicCloudTex(color, nebRng, 256);
                const mat = new THREE.SpriteMaterial({
                    map: tex, transparent: true,
                    opacity: 0.25 + nebRng.next() * 0.2,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false,
                    rotation: nebRng.next() * Math.PI * 2
                });
                const sprite = new THREE.Sprite(mat);
                const mx = c1.x + (c2.x - c1.x) * t + (nebRng.next() - 0.5) * 80;
                const my = c1.y + (c2.y - c1.y) * t + (nebRng.next() - 0.5) * 40;
                const mz = c1.z + (c2.z - c1.z) * t + (nebRng.next() - 0.5) * 80;
                sprite.position.set(mx, my, mz);
                const fSize = 80 + nebRng.next() * 150;
                sprite.scale.set(fSize, fSize, 1);
                universeGroup.add(sprite);
            }
        }

        // Scattered void nebulae — very faint, very large
        const voidCloudCount = 8 + Math.floor(nebRng.next() * 8);
        for (let vc = 0; vc < voidCloudCount; vc++) {
            const color = nebulaColors[Math.floor(nebRng.next() * nebulaColors.length)];
            const tex = makeCosmicCloudTex(color, nebRng, 256);
            const mat = new THREE.SpriteMaterial({
                map: tex, transparent: true,
                opacity: 0.15 + nebRng.next() * 0.15,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                rotation: nebRng.next() * Math.PI * 2
            });
            const sprite = new THREE.Sprite(mat);
            sprite.position.set(
                (nebRng.next() - 0.5) * universeRadius * 1.6,
                (nebRng.next() - 0.5) * universeRadius * 0.8,
                (nebRng.next() - 0.5) * universeRadius * 1.6
            );
            const vSize = 150 + nebRng.next() * 300;
            sprite.scale.set(vSize, vSize, 1);
            universeGroup.add(sprite);
        }
    }

    // ---- Universe wormholes ----
    if (universeData.universeWormholes && universeData.universeWormholes.length > 0) {
        const whTex = createWormholeTexture();
        for (let wi = 0; wi < universeData.universeWormholes.length; wi++) {
            const wh = universeData.universeWormholes[wi];

            // Entry endpoint sprite
            const mat1 = new THREE.SpriteMaterial({
                map: whTex, transparent: true,
                blending: THREE.AdditiveBlending, depthWrite: false
            });
            const sp1 = new THREE.Sprite(mat1);
            sp1.position.set(wh.x1, wh.y1, wh.z1);
            sp1.scale.set(18, 18, 1);
            sp1.userData = { type: 'wormhole', whIndex: wi, endpoint: 'entry' };
            universeGroup.add(sp1);
            uniWormholeSprites.push(sp1);

            // Exit endpoint sprite
            const mat2 = new THREE.SpriteMaterial({
                map: whTex, transparent: true,
                blending: THREE.AdditiveBlending, depthWrite: false
            });
            const sp2 = new THREE.Sprite(mat2);
            sp2.position.set(wh.x2, wh.y2, wh.z2);
            sp2.scale.set(18, 18, 1);
            sp2.userData = { type: 'wormhole', whIndex: wi, endpoint: 'exit' };
            universeGroup.add(sp2);
            uniWormholeSprites.push(sp2);

            // Tunnel-styled wormhole connection
            const p1 = new THREE.Vector3(wh.x1, wh.y1, wh.z1);
            const p2 = new THREE.Vector3(wh.x2, wh.y2, wh.z2);
            // Create a curved path with a midpoint bow for tunnel feel
            const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
            const whSeedRng = new SeededRandom(wh.nearGalaxyIndex * 137 + wi);
            mid.x += (whSeedRng.next() - 0.5) * 60;
            mid.y += (whSeedRng.next() - 0.5) * 30;
            mid.z += (whSeedRng.next() - 0.5) * 60;
            const tunnelCurve = new THREE.QuadraticBezierCurve3(p1, mid, p2);
            const tunnelGeo = new THREE.TubeGeometry(tunnelCurve, 32, 2.5, 8, false);
            // Per-vertex alpha: bright at endpoints, fading in middle
            const tPos = tunnelGeo.attributes.position;
            const tAlphas = new Float32Array(tPos.count);
            for (let ti = 0; ti < tPos.count; ti++) {
                const tp = new THREE.Vector3(tPos.getX(ti), tPos.getY(ti), tPos.getZ(ti));
                const d1 = tp.distanceTo(p1), d2 = tp.distanceTo(p2);
                const totalDist = p1.distanceTo(p2);
                const minEndDist = Math.min(d1, d2) / totalDist;
                // Brighter near endpoints, dimmer in middle
                tAlphas[ti] = 0.15 + 0.85 * Math.pow(1 - Math.min(1, minEndDist / 0.5), 2);
            }
            tunnelGeo.setAttribute('alphaFade', new THREE.BufferAttribute(tAlphas, 1));
            const tunnelMat = new THREE.ShaderMaterial({
                vertexShader: `
                    attribute float alphaFade;
                    varying float vAlpha;
                    void main() {
                        vAlpha = alphaFade;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying float vAlpha;
                    void main() {
                        gl_FragColor = vec4(0.25, 1.0, 0.85, vAlpha * 0.12);
                    }
                `,
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
            const tunnel = new THREE.Mesh(tunnelGeo, tunnelMat);
            universeGroup.add(tunnel);
            uniWormholeLines.push(tunnel);
        }
    }

    // ---- Quasars ----
    if (universeData.quasars && universeData.quasars.length > 0) {
        for (let qi = 0; qi < universeData.quasars.length; qi++) {
            const q = universeData.quasars[qi];
            const qTex = createQuasarTexture();

            // Core sprite — ultra-bright, pulsing, noticeably larger than galaxies
            const coreMat = new THREE.SpriteMaterial({
                map: qTex, transparent: true,
                blending: THREE.AdditiveBlending, depthWrite: false
            });
            const coreSprite = new THREE.Sprite(coreMat);
            coreSprite.position.set(q.x, q.y, q.z);
            const coreSize = 18 + Math.min(q.luminosity / 100, 14);
            coreSprite.scale.set(coreSize, coreSize, 1);
            coreSprite.userData = { type: 'quasar', quasarIndex: qi };
            universeGroup.add(coreSprite);
            quasarSprites.push(coreSprite);

            // Jets are represented visually by the starburst diffraction spikes
            // in the quasar texture rather than separate line geometry, which
            // looked cluttered at universe scale.
        }
    }
}

// ============================================================
// CAMERA CONTROLS
// ============================================================
function onMouseDown(e) {
    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    autoRotate = false;
    isCamAnimating = false; // cancel pan animation on manual drag
    clearTimeout(autoRotateTimer);
    renderer.domElement.style.cursor = 'grabbing';
}

function onMouseMove(e) {
    if (isDragging) {
        const dx = e.clientX - dragStartX;
        const dy = e.clientY - dragStartY;
        camTheta -= dx * 0.005;
        camPhi -= dy * 0.005;
        camPhi = Math.max(0.1, Math.min(Math.PI - 0.1, camPhi));
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        updateCamera();
    } else {
        // Hover detection
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);

        hoveredGalaxyIndex = -1;
        hoverRing.visible = false;

        // Check wormhole endpoints first
        if (uniWormholeSprites.length > 0) {
            const whHits = raycaster.intersectObjects(uniWormholeSprites);
            if (whHits.length > 0) {
                const sp = whHits[0].object;
                hoverRing.position.copy(sp.position);
                hoverRing.scale.setScalar(22);
                hoverRing.lookAt(camera.position);
                hoverRing.visible = true;
                renderer.domElement.style.cursor = 'pointer';
                return;
            }
        }

        // Check quasars
        if (quasarSprites.length > 0) {
            const qHits = raycaster.intersectObjects(quasarSprites);
            if (qHits.length > 0) {
                const sp = qHits[0].object;
                hoverRing.position.copy(sp.position);
                hoverRing.scale.setScalar(20);
                hoverRing.lookAt(camera.position);
                hoverRing.visible = true;
                renderer.domElement.style.cursor = 'pointer';
                return;
            }
        }

        const hits = raycaster.intersectObjects(galaxySprites);
        if (hits.length > 0) {
            const gi = hits[0].object.userData.galaxyIndex;
            hoveredGalaxyIndex = gi;
            const gal = universeData.galaxies[gi];
            hoverRing.position.set(gal.x, gal.y, gal.z);
            hoverRing.scale.setScalar(gal.size * 2.2);
            hoverRing.lookAt(camera.position);
            hoverRing.visible = true;
            renderer.domElement.style.cursor = 'pointer';
        } else {
            renderer.domElement.style.cursor = 'crosshair';
        }
    }
}

function onMouseUp() {
    if (isDragging) {
        isDragging = false;
        renderer.domElement.style.cursor = 'crosshair';
        // Resume auto-rotate after 4 seconds
        autoRotateTimer = setTimeout(() => { autoRotate = true; }, 4000);
    }
}

function onWheel(e) {
    e.preventDefault();
    const factor = e.deltaY > 0 ? 1.08 : 0.92;
    camDist *= factor;
    camDist = Math.max(100, Math.min(5000, camDist));
    camDistTarget = camDist; // sync target so animation doesn't pull back
    isCamAnimating = false;  // stop any in-flight animation
    updateCamera();
}

function onClick(e) {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    // Check wormholes first
    if (uniWormholeSprites.length > 0) {
        const whHits = raycaster.intersectObjects(uniWormholeSprites);
        if (whHits.length > 0) {
            selectUniverseWormhole(whHits[0].object.userData.whIndex, whHits[0].object.userData.endpoint);
            return;
        }
    }

    // Check quasars (before galaxies — they overlap with host)
    if (quasarSprites.length > 0) {
        const qHits = raycaster.intersectObjects(quasarSprites);
        if (qHits.length > 0) {
            selectQuasar(qHits[0].object.userData.quasarIndex);
            return;
        }
    }

    // Check galaxies
    const galHits = raycaster.intersectObjects(galaxySprites);
    if (galHits.length > 0) {
        selectGalaxy(galHits[0].object.userData.galaxyIndex);
        return;
    }

    // Check cluster halos
    const clHits = raycaster.intersectObjects(clusterHaloMeshes);
    if (clHits.length > 0) {
        selectCluster(clHits[0].object.userData.clusterIndex);
    }
}

function onDblClick(e) {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    // Check wormholes
    if (uniWormholeSprites.length > 0) {
        const whHits = raycaster.intersectObjects(uniWormholeSprites);
        if (whHits.length > 0) {
            const wh = universeData.universeWormholes[whHits[0].object.userData.whIndex];
            const destGalIdx = whHits[0].object.userData.endpoint === 'entry' ? wh.destGalaxyIndex : wh.nearGalaxyIndex;
            enterGalaxy(destGalIdx);
            return;
        }
    }

    const hits = raycaster.intersectObjects(galaxySprites);
    if (hits.length > 0) enterGalaxy(hits[0].object.userData.galaxyIndex);
}

function zoomIn() { camDist = Math.max(100, camDist * 0.7); camDistTarget = camDist; isCamAnimating = false; updateCamera(); }
function zoomOut() { camDist = Math.min(5000, camDist * 1.3); camDistTarget = camDist; isCamAnimating = false; updateCamera(); }
function resetView() { camTheta = 0; camPhi = Math.PI / 4; camDist = 1800; updateCamera(); }

// ============================================================
// SELECTION & DETAIL
// ============================================================
function selectGalaxy(index) {
    selectedGalaxyIndex = index;
    selectedClusterIndex = -1;
    const gal = universeData.galaxies[index];

    // Position selection ring
    selectionRing.position.set(gal.x, gal.y, gal.z);
    selectionRing.scale.setScalar(gal.size * 2.5);
    selectionRing.lookAt(camera.position);
    selectionRing.visible = true;

    // Smooth pan camera to center on this galaxy
    const galDist = Math.sqrt(gal.x * gal.x + gal.y * gal.y + gal.z * gal.z) || 1;
    camPhiTarget = Math.acos(Math.max(-1, Math.min(1, gal.y / galDist)));
    camThetaTarget = Math.atan2(gal.z, gal.x);
    camDistTarget = Math.max(galDist * 2.5, 300);
    isCamAnimating = true;
    autoRotate = false;
    clearTimeout(autoRotateTimer);

    // Highlight in list
    document.querySelectorAll('.galaxy-list-item').forEach(el => {
        el.classList.toggle('selected', parseInt(el.dataset.index) === index);
    });

    const detail = document.getElementById('galaxy-detail');
    detail.classList.add('active');
    document.getElementById('detail-header').textContent = 'Selected Galaxy';
    document.getElementById('gd-name').textContent = gal.name;
    document.getElementById('gd-id').textContent = gal.id;
    document.getElementById('gd-type').innerHTML = `<span style="color:${gal.type.color}">${gal.type.name}</span>`;
    document.getElementById('gd-systems').textContent = gal.props ? gal.props.systemCount : '—';
    document.getElementById('gd-arms').textContent = gal.props ? (gal.props.armCount > 0 ? gal.props.armCount : 'N/A') : '—';
    document.getElementById('gd-cluster').textContent = gal.cluster ? gal.cluster.name : 'Field Galaxy (void)';
    document.getElementById('gd-smbh').innerHTML = gal.props
        ? `<span style="color:#ff8844">${gal.props.smbhName}</span> (${gal.props.smbhMass.toFixed(1)}B M☉${gal.props.smbhActive ? ', <span style="color:#ff6622">Active</span>' : ''})`
        : '—';
    document.getElementById('gd-enter-container').innerHTML =
        `<button class="btn primary" onclick="enterGalaxy(${index})">Enter ${gal.name}</button>`;
}

function selectCluster(index) {
    selectedClusterIndex = index;
    selectedGalaxyIndex = -1;
    selectionRing.visible = false;
    const cluster = universeData.clusters[index];

    document.querySelectorAll('.galaxy-list-item').forEach(el => el.classList.remove('selected'));

    const clusterGals = universeData.galaxies.filter(g => g.cluster && g.cluster.index === index);
    const totalSystems = clusterGals.reduce((s, g) => s + (g.props ? g.props.systemCount : 0), 0);

    const detail = document.getElementById('galaxy-detail');
    detail.classList.add('active');
    document.getElementById('detail-header').textContent = 'Selected Cluster';
    document.getElementById('gd-name').textContent = cluster.name;
    document.getElementById('gd-id').textContent = cluster.id;
    document.getElementById('gd-type').innerHTML = '<span style="color:#aa88dd">Galaxy Cluster</span>';
    document.getElementById('gd-systems').textContent = `${totalSystems} (across ${clusterGals.length} galaxies)`;
    document.getElementById('gd-arms').textContent = '—';
    document.getElementById('gd-cluster').textContent = `${clusterGals.length} member galaxies`;
    document.getElementById('gd-smbh').textContent = '—';
    document.getElementById('gd-enter-container').innerHTML = '';
}

function selectUniverseWormhole(whIndex, endpoint) {
    const wh = universeData.universeWormholes[whIndex];
    selectedGalaxyIndex = -1;
    selectedClusterIndex = -1;
    document.querySelectorAll('.galaxy-list-item').forEach(el => el.classList.remove('selected'));

    // Position selection ring at clicked endpoint
    const px = endpoint === 'entry' ? wh.x1 : wh.x2;
    const py = endpoint === 'entry' ? wh.y1 : wh.y2;
    const pz = endpoint === 'entry' ? wh.z1 : wh.z2;
    selectionRing.position.set(px, py, pz);
    selectionRing.scale.setScalar(22);
    selectionRing.lookAt(camera.position);
    selectionRing.visible = true;

    const nearGal = universeData.galaxies[wh.nearGalaxyIndex];
    const destGal = universeData.galaxies[wh.destGalaxyIndex];
    const destGalIdx = endpoint === 'entry' ? wh.destGalaxyIndex : wh.nearGalaxyIndex;

    const detail = document.getElementById('galaxy-detail');
    detail.classList.add('active');
    document.getElementById('detail-header').textContent = 'Inter-Galactic Wormhole';
    document.getElementById('gd-name').innerHTML = `<span style="color:#44ffdd">${wh.name}</span>`;
    document.getElementById('gd-id').textContent = `${universeData.id}:${wh.id}`;
    document.getElementById('gd-type').innerHTML = '<span style="color:#44ffdd">Spatial Wormhole</span>';
    document.getElementById('gd-systems').textContent = '—';
    document.getElementById('gd-arms').textContent = '—';
    document.getElementById('gd-cluster').innerHTML = `Connects: <span style="color:${nearGal.type.color}">${nearGal.name}</span> ↔ <span style="color:${destGal.type.color}">${destGal.name}</span>`;
    document.getElementById('gd-smbh').textContent = 'Status: Stable / Active';
    document.getElementById('gd-enter-container').innerHTML =
        `<button class="btn primary" style="border-color:#44ffdd; color:#44ffdd;" onclick="enterGalaxy(${destGalIdx})">Enter Destination Galaxy</button>`;
}

function selectQuasar(qIndex) {
    const q = universeData.quasars[qIndex];
    selectedGalaxyIndex = -1;
    selectedClusterIndex = -1;
    document.querySelectorAll('.galaxy-list-item').forEach(el => el.classList.remove('selected'));

    // Position selection ring
    selectionRing.position.set(q.x, q.y, q.z);
    selectionRing.scale.setScalar(20);
    selectionRing.lookAt(camera.position);
    selectionRing.visible = true;

    // Smooth pan camera toward quasar
    const qDist = Math.sqrt(q.x * q.x + q.y * q.y + q.z * q.z) || 1;
    camPhiTarget = Math.acos(Math.max(-1, Math.min(1, q.y / qDist)));
    camThetaTarget = Math.atan2(q.z, q.x);
    camDistTarget = Math.max(qDist * 2.5, 250);
    isCamAnimating = true;
    autoRotate = false;
    clearTimeout(autoRotateTimer);

    const detail = document.getElementById('galaxy-detail');
    detail.classList.add('active');
    document.getElementById('detail-header').textContent = 'Quasar';
    document.getElementById('gd-name').innerHTML = `<span style="color:${q.type.color}">${q.name}</span>`;
    document.getElementById('gd-id').textContent = `${universeData.id}:${q.id}`;
    document.getElementById('gd-type').innerHTML = `<span style="color:${q.type.color}">${q.type.name}</span>`;
    document.getElementById('gd-systems').textContent = `Luminosity: ${q.luminosity.toFixed(0)} × 10¹² L☉`;
    document.getElementById('gd-arms').textContent = `Redshift: z = ${q.redshift.toFixed(2)}`;
    document.getElementById('gd-cluster').innerHTML = `Host: <span style="color:${universeData.galaxies[q.hostGalaxyIndex].type.color}">${q.hostGalaxyName}</span>`;
    document.getElementById('gd-smbh').innerHTML = `<span style="color:#ff8844">Supermassive Black Hole</span> — Actively Accreting`;
    document.getElementById('gd-enter-container').innerHTML =
        `<button class="btn primary" style="border-color:${q.type.color}; color:${q.type.color};" onclick="enterGalaxy(${q.hostGalaxyIndex})">Enter Host Galaxy</button>`;
}

function enterGalaxy(index) {
    const gal = universeData.galaxies[index];
    const params = new URLSearchParams({
        seed: gal.seed, universe: universeData.name,
        universeId: universeData.id, galaxyCatalogId: gal.id,
        returnUniverseSeed: universeData.seed,
        density: universeDensity
    });
    window.location.href = `galaxy_view.html?${params.toString()}`;
}

// ============================================================
// GALAXY LIST
// ============================================================
let allListItems = [];

function buildGalaxyList() {
    const container = document.getElementById('galaxy-list');
    container.innerHTML = '';
    allListItems = [];

    const clusterMap = new Map();
    const fieldGalaxies = [];
    for (const gal of universeData.galaxies) {
        if (gal.cluster) {
            if (!clusterMap.has(gal.cluster.index)) clusterMap.set(gal.cluster.index, []);
            clusterMap.get(gal.cluster.index).push(gal);
        } else fieldGalaxies.push(gal);
    }

    for (const [ci, gals] of clusterMap) {
        const cluster = universeData.clusters[ci];
        const header = document.createElement('div');
        header.className = 'cluster-header';
        header.textContent = `${cluster.name} (${gals.length})`;
        header.onclick = () => selectCluster(ci);
        container.appendChild(header);
        for (const gal of gals.sort((a, b) => a.name.localeCompare(b.name))) {
            container.appendChild(createGalaxyListItem(gal));
        }
    }
    if (fieldGalaxies.length > 0) {
        const header = document.createElement('div');
        header.className = 'cluster-header';
        header.textContent = `Field Galaxies (${fieldGalaxies.length})`;
        container.appendChild(header);
        for (const gal of fieldGalaxies.sort((a, b) => a.name.localeCompare(b.name))) {
            container.appendChild(createGalaxyListItem(gal));
        }
    }
}

function createGalaxyListItem(gal) {
    const item = document.createElement('div');
    item.className = 'galaxy-list-item';
    item.dataset.index = gal.index;
    // Build searchable text: name + type + tags
    let searchText = gal.name.toLowerCase() + ' ' + gal.type.name.toLowerCase();
    if (gal.cluster) searchText += ' ' + gal.cluster.name.toLowerCase();
    else searchText += ' field';
    if (gal.props && gal.props.smbhActive) searchText += ' agn active';
    if (gal.hasQuasar) searchText += ' quasar';
    item.dataset.name = searchText;
    item.onclick = () => { selectGalaxy(gal.index); };
    item.ondblclick = () => { enterGalaxy(gal.index); };

    const dot = document.createElement('div');
    dot.className = 'galaxy-dot';
    dot.style.width = '12px'; dot.style.height = '12px';
    dot.style.background = `radial-gradient(circle, ${gal.type.color}, ${gal.type.glowColor}44)`;

    const info = document.createElement('div');
    info.className = 'galaxy-info-text';
    let tags = '';
    if (gal.cluster) tags += `<span class="tag tag-cluster">${gal.cluster.name.split(' ')[0]}</span>`;
    else tags += '<span class="tag tag-field">Field</span>';
    if (gal.props && gal.props.smbhActive) tags += '<span class="tag tag-active">AGN</span>';
    if (gal.hasQuasar) tags += '<span class="tag tag-quasar">Quasar</span>';
    info.innerHTML = `<div class="name">${gal.name}</div>
        <div class="type">${gal.type.name} · ${gal.props ? gal.props.systemCount : '?'} systems${tags}</div>`;

    item.appendChild(dot);
    item.appendChild(info);
    allListItems.push(item);
    return item;
}

function filterGalaxies() {
    const query = document.getElementById('search-input').value.toLowerCase();
    for (const item of allListItems) item.style.display = (!query || item.dataset.name.includes(query)) ? 'flex' : 'none';
    document.querySelectorAll('.cluster-header').forEach(h => h.style.display = query ? 'none' : 'block');
}

// ============================================================
// UNIVERSE INFO
// ============================================================
function updateUniverseInfo() {
    const { galaxies, clusters, edges } = universeData;
    document.getElementById('uni-name').textContent = universeData.name;
    document.getElementById('uni-id').textContent = universeData.id;
    document.getElementById('uni-galaxy-count').textContent = galaxies.length;
    document.getElementById('uni-cluster-count').textContent = clusters.length;
    document.getElementById('uni-filament-count').textContent = edges.length;
    document.getElementById('uni-system-count').textContent =
        galaxies.reduce((s, g) => s + (g.props ? g.props.systemCount : 0), 0).toLocaleString();
    document.getElementById('uni-quasar-count').textContent =
        universeData.quasars ? universeData.quasars.length : 0;
}

// ============================================================
// ANIMATION & HUD
// ============================================================
function updateHUD() {
    const { galaxies, clusters } = universeData;
    const hud = document.getElementById('hud-overlay');
    hud.innerHTML = `<div style="font:bold 14px 'Courier New'">${universeData.name}</div>
        <div>${galaxies.length} galaxies · ${clusters.length} clusters</div>`;
}

function animate() {
    requestAnimationFrame(animate);

    // Smooth camera pan-to-target animation
    if (isCamAnimating) {
        const speed = 0.06;
        // Handle theta wrapping (shortest angular path)
        let dTheta = camThetaTarget - camTheta;
        while (dTheta > Math.PI) dTheta -= 2 * Math.PI;
        while (dTheta < -Math.PI) dTheta += 2 * Math.PI;
        camTheta += dTheta * speed;
        camPhi += (camPhiTarget - camPhi) * speed;
        camDist += (camDistTarget - camDist) * speed;
        updateCamera();
        if (Math.abs(dTheta) < 0.001 && Math.abs(camPhi - camPhiTarget) < 0.001 && Math.abs(camDist - camDistTarget) < 1) {
            camTheta = camThetaTarget;
            camPhi = camPhiTarget;
            camDist = camDistTarget;
            isCamAnimating = false;
        }
    } else if (autoRotate && !isDragging) {
        camTheta += 0.0008;
        updateCamera();
    }

    // Keep selection/hover rings facing camera
    if (selectionRing.visible) selectionRing.lookAt(camera.position);
    if (hoverRing.visible) hoverRing.lookAt(camera.position);

    // Pulse universe wormhole sprites
    if (uniWormholeSprites.length > 0) {
        const t = performance.now();
        for (let i = 0; i < uniWormholeSprites.length; i++) {
            const pulse = 18 + 3 * Math.sin(t * 0.003 + i * 1.5);
            uniWormholeSprites[i].scale.set(pulse, pulse, 1);
        }
    }

    // Pulse quasar sprites — vivid brightness flicker + slow rotation
    if (quasarSprites.length > 0) {
        const t = performance.now();
        for (let i = 0; i < quasarSprites.length; i++) {
            const baseSize = quasarSprites[i].userData.baseSize || quasarSprites[i].scale.x;
            if (!quasarSprites[i].userData.baseSize) quasarSprites[i].userData.baseSize = baseSize;
            const flicker = 1.0 + 0.12 * Math.sin(t * 0.004 + i * 2.7) + 0.06 * Math.sin(t * 0.011 + i * 4.1);
            const s = baseSize * flicker;
            quasarSprites[i].scale.set(s, s, 1);
            quasarSprites[i].material.opacity = 0.85 + 0.15 * Math.sin(t * 0.003 + i * 3.3);
            // Slow rotation so the spikes shift visually
            quasarSprites[i].material.rotation = t * 0.0002 + i * 0.5;
        }
    }

    renderer.render(scene, camera);
}

// ============================================================
// GENERATION & INIT
// ============================================================
function regenerateUniverse(resetCamera) {
    const seed = parseInt(document.getElementById('seed-input').value) || 1;
    universeDensity = parseFloat(document.getElementById('density-slider').value) || 1.0;
    document.getElementById('density-value').textContent = universeDensity + 'x';
    universeData = generateUniverse(seed);
    universeData.density = universeDensity;
    selectedGalaxyIndex = -1;
    hoveredGalaxyIndex = -1;
    selectedClusterIndex = -1;
    document.getElementById('galaxy-detail').classList.remove('active');
    document.getElementById('search-input').value = '';
    if (resetCamera !== false) {
        camTheta = 0; camPhi = Math.PI / 4; camDist = 1800;
        updateCamera();
    }
    updateUniverseInfo();
    buildGalaxyList();
    buildUniverseScene();
    updateHUD();
}

// Density slider — update label live, regenerate on release
function initDensitySlider() {
    const slider = document.getElementById('density-slider');
    slider.addEventListener('input', () => {
        document.getElementById('density-value').textContent = slider.value + 'x';
    });
    slider.addEventListener('change', () => {
        regenerateUniverse(false);
    });
}

function randomSeed() {
    document.getElementById('seed-input').value = Math.floor(Math.random() * 999999) + 1;
    regenerateUniverse();
}

// Init
initThree();
initDensitySlider();

// Check URL params for seed and density
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('seed')) document.getElementById('seed-input').value = urlParams.get('seed');
if (urlParams.get('density')) document.getElementById('density-slider').value = urlParams.get('density');

regenerateUniverse();
animate();
</script>
