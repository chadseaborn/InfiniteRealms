<body>

<div id="canvas-container">
    <canvas id="systemCanvas"></canvas>
    <button id="back-btn" onclick="returnToGalaxy()" style="display:none; position:absolute; top:20px; left:20px; padding:8px 16px; background:#2a2a4a; border:1px solid #555; border-radius:4px; color:#ffcc00; cursor:pointer; font-family:'Courier New',monospace; font-size:13px; z-index:10; transition:all 0.15s;">← Return to Galaxy</button>
    <div id="controls">

</div>

<div id="info-panel">
    <h1>Star System View</h1>

    <div id="star-info">
        <h2>Star</h2>
        <div class="stat">Name: <span id="star-name">—</span></div>
        <div class="stat">ID: <span id="star-id" style="color:#ffcc00;font-size:11px;letter-spacing:0.5px">—</span></div>

    <h2>Planets</h2>

        <div class="stat">Name: <span id="pd-name">—</span></div>

    <div id="seed-control">
        <label class="stat">System Seed</label>
        <input type="text" id="seed-input" value="42">
        <button class="btn" onclick="regenerateSystem()">Generate</button>
        <button class="btn" onclick="randomSeed()">Random</button>
    </div>
</div>

<script>
// ============================================================
// SEEDED RANDOM
// ============================================================
class SeededRandom {
    constructor(seed) {
        this.seed = seed % 2147483647;
        if (this.seed <= 0) this.seed += 2147483646;
    }
    next() {
        this.seed = (this.seed * 16807) % 2147483647;
        return (this.seed - 1) / 2147483646;
    }
    nextInt(min, max) {
        return Math.floor(this.next() * (max - min + 1)) + min;
    }
    nextFloat(min, max) {
        return this.next() * (max - min) + min;
    }
    pick(arr) {
        return arr[Math.floor(this.next() * arr.length)];
    }
    weightedPick(items) {
        // items = [{value, frequency}, ...]
        const total = items.reduce((s, i) => s + i.frequency, 0);
        let r = this.next() * total;
        for (const item of items) {
            r -= item.frequency;
            if (r <= 0) return item;
        }
        return items[items.length - 1];
    }
}

// ============================================================
// STAR SYSTEM GENERATION
// ============================================================
const STAR_TYPES = [
    { id: 'red_dwarf',    name: 'Red Dwarf',     frequency: 0.30, luminosity: 'Low',      color: '#ff6644', radius: 20, planetCount: [1,6],  habZone: [1,2] },
    { id: 'yellow_sun',   name: 'Yellow Sun',    frequency: 0.22, luminosity: 'Medium',   color: '#ffdd44', radius: 30, planetCount: [3,14], habZone: [2,5] },
    { id: 'blue_giant',   name: 'Blue Giant',    frequency: 0.06, luminosity: 'High',     color: '#6688ff', radius: 45, planetCount: [2,10], habZone: [4,7] },
    { id: 'red_giant',    name: 'Red Giant',     frequency: 0.06, luminosity: 'High',     color: '#ff5533', radius: 50, planetCount: [1,8],  habZone: [5,8], engulfZone: 2 },
    { id: 'white_dwarf',  name: 'White Dwarf',   frequency: 0.08, luminosity: 'Low',      color: '#eeeeff', radius: 10, planetCount: [0,5],  habZone: [1,1] },
    { id: 'brown_dwarf',  name: 'Brown Dwarf',   frequency: 0.06, luminosity: 'Very Low', color: '#884422', radius: 15, planetCount: [0,4],  habZone: [] },
    { id: 'binary',       name: 'Binary System', frequency: 0.10, luminosity: 'Variable', color: '#ffaa44', radius: 25, planetCount: [1,8],  habZone: [3,5] },
    { id: 'neutron_star', name: 'Neutron Star',  frequency: 0.04, luminosity: 'Extreme',  color: '#cc88ff', radius: 8,  planetCount: [0,3],  habZone: [] },
    { id: 'pulsar',       name: 'Pulsar',        frequency: 0.03, luminosity: 'Extreme',  color: '#dd99ff', radius: 8,  planetCount: [0,2],  habZone: [] },
    { id: 'black_hole',   name: 'Black Hole',    frequency: 0.03, luminosity: 'None',     color: '#220033', radius: 18, planetCount: [0,4],  habZone: [], accretionColor: '#ff6622' },
    { id: 'protostar',    name: 'Protostar',     frequency: 0.02, luminosity: 'Variable', color: '#ffaa66', radius: 35, planetCount: [0,3],  habZone: [], diskColor: '#886633' },
];

// Possible companion stars for binary systems
const BINARY_COMPANIONS = [
    { id: 'red_dwarf',   name: 'Red Dwarf',   frequency: 0.40, color: '#ff6644', radius: 0.5 },
    { id: 'yellow_sun',  name: 'Yellow Sun',   frequency: 0.25, color: '#ffdd44', radius: 0.7 },
    { id: 'white_dwarf', name: 'White Dwarf',  frequency: 0.20, color: '#eeeeff', radius: 0.3 },
    { id: 'red_giant',   name: 'Red Giant',    frequency: 0.05, color: '#ff5533', radius: 1.2 },
    { id: 'neutron_star',name: 'Neutron Star',  frequency: 0.07, color: '#cc88ff', radius: 0.25 },
    { id: 'black_hole',  name: 'Black Hole',   frequency: 0.03, color: '#220033', radius: 0.4 },
];

const PLANET_TYPES = [
    { id: 'barren_rock', name: 'Barren Rock',  frequency: 0.25, orbitalBias: 'inner',   color: '#888877', sizeN: [3,8],   landable: true,  atmosphere: 'None',       biomes: ['rock','crater','dust'] },
    { id: 'habitable',   name: 'Habitable',    frequency: 0.15, orbitalBias: 'hab_zone', color: '#44aa66', sizeN: [20,100], landable: true,  atmosphere: 'Breathable', biomes: ['full biome set'] },
    { id: 'ocean_world', name: 'Ocean World',  frequency: 0.10, orbitalBias: 'hab_zone', color: '#3366bb', sizeN: [15,60],  landable: true,  atmosphere: 'Breathable', biomes: ['deep ocean','ocean','coast','island'] },
    { id: 'ice_world',   name: 'Ice World',    frequency: 0.15, orbitalBias: 'outer',   color: '#aaccdd', sizeN: [8,30],   landable: true,  atmosphere: 'Thin',       biomes: ['tundra','snow peak','frozen ocean'] },
    { id: 'gas_giant',   name: 'Gas Giant',    frequency: 0.20, orbitalBias: 'outer',   color: '#cc8844', sizeN: [30,80],  landable: false, atmosphere: 'Crushing',   biomes: ['—'], moonRange: [1,8], stationRange: [0,3] },
    { id: 'volcanic',    name: 'Volcanic',     frequency: 0.10, orbitalBias: 'inner',   color: '#cc3311', sizeN: [5,20],   landable: true,  atmosphere: 'Toxic',      biomes: ['lava field','obsidian waste','volcanic','ash desert'] },
    { id: 'anomalous',   name: 'Anomalous',    frequency: 0.05, orbitalBias: 'any',     color: '#aa44cc', sizeN: [3,50],   landable: true,  atmosphere: 'Unknown',    biomes: ['custom'] },
];

const LIFE_CLASSES = [
    { id: 'none',      name: 'No Life',         color: '#666' },
    { id: 'primitive',  name: 'Primitive Life',   color: '#6a6' },
    { id: 'civilized',  name: 'Civilized',        color: '#68f' },
    { id: 'extinct',    name: 'Extinct Civ.',     color: '#b86' },
    { id: 'advanced',   name: 'Advanced Civ.',    color: '#a6f' },
];

const LIFE_FREQ = {
    barren_rock: [0.85, 0.10, 0.03, 0.02, 0.00],
    habitable:   [0.05, 0.30, 0.40, 0.15, 0.10],
    ocean_world: [0.20, 0.40, 0.20, 0.15, 0.05],
    ice_world:   [0.60, 0.20, 0.10, 0.10, 0.00],
    gas_giant:   [1.00, 0.00, 0.00, 0.00, 0.00],
    volcanic:    [0.70, 0.15, 0.05, 0.10, 0.00],
    anomalous:   [0.50, 0.20, 0.15, 0.10, 0.05],
};

const MOON_TYPES = [
    { id: 'rocky_moon',  name: 'Rocky Moon',  frequency: 0.35, color: '#999988', sizeN: [2,5],  biomes: ['rock','crater','dust'], atmosphere: 'None' },
    { id: 'ice_moon',    name: 'Ice Moon',    frequency: 0.25, color: '#bbccdd', sizeN: [2,6],  biomes: ['tundra','frozen ocean','frozen lake'], atmosphere: 'Thin' },
    { id: 'volcanic_moon', name: 'Volcanic Moon', frequency: 0.15, color: '#cc5533', sizeN: [2,4], biomes: ['lava field','volcanic','obsidian waste'], atmosphere: 'Toxic' },
    { id: 'habitable_moon', name: 'Habitable Moon', frequency: 0.10, color: '#55aa77', sizeN: [3,8], biomes: ['forest','plains','lake','coast'], atmosphere: 'Breathable' },
    { id: 'barren_moon', name: 'Barren Moon', frequency: 0.15, color: '#777766', sizeN: [2,3],  biomes: ['rock','dust'], atmosphere: 'None' },
];

const ROMAN = ['I','II','III','IV','V','VI','VII','VIII'];

const GREEK = ['Alpha','Beta','Gamma','Delta','Epsilon','Zeta','Eta','Theta','Iota','Kappa','Lambda','Mu','Nu','Xi'];
const STAR_NAMES_PREFIX = ['Aldara','Borea','Cytha','Draven','Elys','Fenn','Galith','Hyra','Ixen','Jorath','Kael','Lyren','Mytha','Nyx','Orin','Pyra','Quell','Riven','Solen','Tyra','Ulren','Vyss','Wyren','Xael','Yren','Zeph'];
const STAR_NAMES_SUFFIX = ['Prime','Major','Minor','Reach','Deep','Veil','Gate','Rift','Core','Edge'];

function generateSystem(seed, parentSystemId) {
    const rng = new SeededRandom(seed);

    // Star
    const starDef = rng.weightedPick(STAR_TYPES);
    const starName = rng.pick(STAR_NAMES_PREFIX) + ' ' + rng.pick(STAR_NAMES_SUFFIX);

    // System ID — from galaxy context or standalone
    const systemId = parentSystemId || `SYS-${String(seed).padStart(6,'0')}`;

    // Generate binary companion if applicable
    let companion = null;
    if (starDef.id === 'binary') {
        const compDef = rng.weightedPick(BINARY_COMPANIONS);
        companion = {
            type: compDef,
            name: starName + ' B'
        };
    }

    const star = {
        name: starName,
        id: systemId,
        type: starDef,
        companion: companion,
        seed: seed
    };

    // Planets
    const planetCount = rng.nextInt(starDef.planetCount[0], starDef.planetCount[1]);
    const planets = [];

    for (let i = 0; i < planetCount; i++) {
        const orbit = i + 1;
        const inHabZone = starDef.habZone.length >= 2 && orbit >= starDef.habZone[0] && orbit <= starDef.habZone[1];

        // Weight planet type by orbital position
        const weightedTypes = PLANET_TYPES.map(pt => {
            let freq = pt.frequency;
            if (pt.orbitalBias === 'inner' && orbit <= 2) freq *= 2;
            else if (pt.orbitalBias === 'inner' && orbit > 3) freq *= 0.3;
            if (pt.orbitalBias === 'outer' && orbit > 3) freq *= 2;
            else if (pt.orbitalBias === 'outer' && orbit <= 2) freq *= 0.2;
            if (pt.orbitalBias === 'hab_zone' && inHabZone) freq *= 3;
            else if (pt.orbitalBias === 'hab_zone' && !inHabZone) freq *= 0.3;
            return { ...pt, frequency: freq };
        });

        const typeDef = rng.weightedPick(weightedTypes);
        const sizeN = rng.nextInt(typeDef.sizeN[0], typeDef.sizeN[1]);
        const tileCount = 10 * sizeN * sizeN + 2;

        // Life classification
        const lifeFreqs = LIFE_FREQ[typeDef.id] || LIFE_FREQ.barren_rock;
        let lifeRoll = rng.next();
        let lifeIndex = 0;
        let cumulative = 0;
        for (let li = 0; li < lifeFreqs.length; li++) {
            cumulative += lifeFreqs[li];
            if (lifeRoll <= cumulative) { lifeIndex = li; break; }
        }
        const life = LIFE_CLASSES[lifeIndex];

        const planetName = starName.split(' ')[0] + ' ' + GREEK[i];
        const planetId = `${systemId}:${GREEK[i]}`;

        // Moon count
        let moonCount = 0;
        if (typeDef.moonRange) {
            moonCount = rng.nextInt(typeDef.moonRange[0], typeDef.moonRange[1]);
        } else if (sizeN > 15 && rng.next() > 0.5) {
            moonCount = rng.nextInt(0, 3);
        }

        // Generate actual moon objects
        const moonObjects = [];
        for (let mi = 0; mi < moonCount; mi++) {
            const moonTypeDef = rng.weightedPick(MOON_TYPES);
            const moonSizeN = rng.nextInt(moonTypeDef.sizeN[0], moonTypeDef.sizeN[1]);
            const moonTileCount = 10 * moonSizeN * moonSizeN + 2;

            // Moon life classification (most moons are lifeless)
            const moonLifeRoll = rng.next();
            let moonLife = LIFE_CLASSES[0]; // default: no life
            if (moonTypeDef.id === 'habitable_moon') {
                if (moonLifeRoll < 0.05) moonLife = LIFE_CLASSES[4]; // advanced
                else if (moonLifeRoll < 0.20) moonLife = LIFE_CLASSES[2]; // civilized
                else if (moonLifeRoll < 0.50) moonLife = LIFE_CLASSES[1]; // primitive
            } else if (moonTypeDef.id === 'ice_moon') {
                if (moonLifeRoll < 0.10) moonLife = LIFE_CLASSES[1]; // primitive (subsurface life)
            }

            const moonId = `${planetId}:${ROMAN[mi]}`;
            moonObjects.push({
                name: planetName + ' ' + ROMAN[mi],
                id: moonId,
                type: moonTypeDef,
                sizeN: moonSizeN,
                tileCount: moonTileCount,
                life: moonLife,
                seed: seed * 1000 + orbit * 100 + mi + 50,
                orbitIndex: mi,
                isMoon: true
            });
        }

        // Stations (gas giants)
        let stations = 0;
        if (typeDef.stationRange) {
            stations = rng.nextInt(typeDef.stationRange[0], typeDef.stationRange[1]);
        }

        planets.push({
            name: planetName,
            id: planetId,
            orbit: orbit,
            type: typeDef,
            sizeN: sizeN,
            tileCount: tileCount,
            life: life,
            moons: moonCount,
            moonData: moonObjects,
            stations: stations,
            inHabZone: inHabZone,
            seed: seed * 1000 + orbit,
            orbitAngle: rng.nextFloat(0, Math.PI * 2)
        });
    }

    return { star, planets };
}

// ============================================================
// CANVAS RENDERING
// ============================================================
let canvas, ctx;
let systemData = null;
let selectedPlanetIndex = -1;
let hoveredPlanetIndex = -1;
let selectedMoon = null;  // { planetIndex, moonIndex }
let hoveredMoon = null;   // { planetIndex, moonIndex }
let animationTime = 0;
let canvasWidth, canvasHeight;
let centerX, centerY;

function initCanvas() {
    canvas = document.getElementById('systemCanvas');
    ctx = canvas.getContext('2d');
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    canvas.addEventListener('mousemove', onMouseMove);
    canvas.addEventListener('click', onClick);
    canvas.addEventListener('dblclick', onDblClick);
}

function resizeCanvas() {
    const container = document.getElementById('canvas-container');
    canvasWidth = container.clientWidth;
    canvasHeight = container.clientHeight;
    canvas.width = canvasWidth;
    canvas.height = canvasHeight;
    centerX = canvasWidth / 2;
    centerY = canvasHeight / 2;
}

function getOrbitRadius(orbit, totalOrbits) {
    const minR = 80;
    const maxR = Math.min(canvasWidth, canvasHeight) * 0.42;
    return minR + (maxR - minR) * (orbit - 1) / Math.max(1, totalOrbits);
}

function getPlanetScreenPos(planet, totalOrbits) {
    const orbitR = getOrbitRadius(planet.orbit, totalOrbits);
    const angle = planet.orbitAngle + animationTime * (0.0003 / planet.orbit);
    return {
        x: centerX + Math.cos(angle) * orbitR,
        y: centerY + Math.sin(angle) * orbitR,
        orbitR: orbitR
    };
}

function getPlanetRadius(planet) {
    // Visual size based on sizeN
    const base = Math.log2(planet.sizeN + 1) * 4;
    return Math.max(5, Math.min(25, base));
}

function drawSystem() {
    if (!systemData) return;

    ctx.clearRect(0, 0, canvasWidth, canvasHeight);

    // Draw starfield background
    const bgRng = new SeededRandom(12345);
    ctx.fillStyle = '#ffffff';
    for (let i = 0; i < 200; i++) {
        const sx = bgRng.next() * canvasWidth;
        const sy = bgRng.next() * canvasHeight;
        const sr = bgRng.next() * 1.2;
        const alpha = bgRng.nextFloat(0.2, 0.7);
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    const { star, planets } = systemData;
    const totalOrbits = planets.length > 0 ? planets[planets.length - 1].orbit + 1 : 2;

    // Habitable zone band
    if (star.type.habZone.length >= 2) {
        const innerR = getOrbitRadius(star.type.habZone[0] - 0.4, totalOrbits);
        const outerR = getOrbitRadius(star.type.habZone[1] + 0.4, totalOrbits);
        const grad = ctx.createRadialGradient(centerX, centerY, innerR, centerX, centerY, outerR);
        grad.addColorStop(0, 'rgba(80, 180, 80, 0)');
        grad.addColorStop(0.3, 'rgba(80, 180, 80, 0.06)');
        grad.addColorStop(0.7, 'rgba(80, 180, 80, 0.06)');
        grad.addColorStop(1, 'rgba(80, 180, 80, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(centerX, centerY, outerR, 0, Math.PI * 2);
        ctx.fill();
    }

    // Draw orbit lines
    for (const planet of planets) {
        const orbitR = getOrbitRadius(planet.orbit, totalOrbits);
        ctx.strokeStyle = planet.inHabZone ? 'rgba(80,180,80,0.2)' : 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 8]);
        ctx.beginPath();
        ctx.arc(centerX, centerY, orbitR, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    // Draw star
    const starR = star.type.radius;

    // === BLACK HOLE: accretion disk + dark core ===
    if (star.type.id === 'black_hole') {
        // Accretion disk (outer glow)
        const diskGrad = ctx.createRadialGradient(centerX, centerY, starR * 0.6, centerX, centerY, starR * 3.5);
        diskGrad.addColorStop(0, 'rgba(255,102,34,0.5)');
        diskGrad.addColorStop(0.3, 'rgba(255,68,0,0.25)');
        diskGrad.addColorStop(0.6, 'rgba(200,50,0,0.1)');
        diskGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = diskGrad;
        ctx.beginPath();
        ctx.arc(centerX, centerY, starR * 3.5, 0, Math.PI * 2);
        ctx.fill();

        // Accretion ring
        ctx.strokeStyle = star.type.accretionColor + 'aa';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(centerX, centerY, starR * 2.2, starR * 0.6, 0.4, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = '#ff884488';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.ellipse(centerX, centerY, starR * 1.8, starR * 0.45, 0.4, 0, Math.PI * 2);
        ctx.stroke();

        // Event horizon (dark core)
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(centerX, centerY, starR, 0, Math.PI * 2);
        ctx.fill();
        // Faint photon ring
        ctx.strokeStyle = 'rgba(255,150,50,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(centerX, centerY, starR * 1.1, 0, Math.PI * 2);
        ctx.stroke();
    }
    // === PULSAR: rotating beams ===
    else if (star.type.id === 'pulsar') {
        // Beams
        const beamAngle = animationTime * 0.003;
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(beamAngle);
        const beamGrad = ctx.createLinearGradient(0, 0, 0, -starR * 5);
        beamGrad.addColorStop(0, 'rgba(200,136,255,0.6)');
        beamGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = beamGrad;
        ctx.beginPath();
        ctx.moveTo(-3, 0);
        ctx.lineTo(-8, -starR * 5);
        ctx.lineTo(8, -starR * 5);
        ctx.lineTo(3, 0);
        ctx.fill();
        // Opposite beam
        ctx.rotate(Math.PI);
        ctx.fillStyle = beamGrad;
        ctx.beginPath();
        ctx.moveTo(-3, 0);
        ctx.lineTo(-8, -starR * 5);
        ctx.lineTo(8, -starR * 5);
        ctx.lineTo(3, 0);
        ctx.fill();
        ctx.restore();

        // Star body
        const pulsarGlow = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, starR * 2);
        pulsarGlow.addColorStop(0, star.type.color + 'cc');
        pulsarGlow.addColorStop(0.5, star.type.color + '33');
        pulsarGlow.addColorStop(1, 'transparent');
        ctx.fillStyle = pulsarGlow;
        ctx.beginPath();
        ctx.arc(centerX, centerY, starR * 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(centerX, centerY, starR, 0, Math.PI * 2);
        ctx.fill();
    }
    // === PROTOSTAR: surrounded by accretion disk ===
    else if (star.type.id === 'protostar') {
        // Accretion/protoplanetary disk
        const diskGrad = ctx.createRadialGradient(centerX, centerY, starR, centerX, centerY, starR * 3);
        diskGrad.addColorStop(0, star.type.diskColor + 'aa');
        diskGrad.addColorStop(0.5, star.type.diskColor + '44');
        diskGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = diskGrad;
        ctx.beginPath();
        ctx.ellipse(centerX, centerY, starR * 3, starR * 0.8, 0.2, 0, Math.PI * 2);
        ctx.fill();

        // Star glow
        const glowGrad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, starR * 2);
        glowGrad.addColorStop(0, star.type.color + 'cc');
        glowGrad.addColorStop(0.5, star.type.color + '44');
        glowGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.arc(centerX, centerY, starR * 2, 0, Math.PI * 2);
        ctx.fill();

        // Star body (fuzzy, not fully formed)
        const bodyGrad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, starR);
        bodyGrad.addColorStop(0, '#ffffcc');
        bodyGrad.addColorStop(0.6, star.type.color);
        bodyGrad.addColorStop(1, star.type.color + '88');
        ctx.fillStyle = bodyGrad;
        ctx.beginPath();
        ctx.arc(centerX, centerY, starR, 0, Math.PI * 2);
        ctx.fill();
    }
    // === RED GIANT: big, pulsating feel ===
    else if (star.type.id === 'red_giant') {
        // Outer atmosphere
        const outerGlow = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, starR * 3.5);
        outerGlow.addColorStop(0, '#ff553388');
        outerGlow.addColorStop(0.3, '#ff443344');
        outerGlow.addColorStop(0.6, '#ff221111');
        outerGlow.addColorStop(1, 'transparent');
        ctx.fillStyle = outerGlow;
        ctx.beginPath();
        ctx.arc(centerX, centerY, starR * 3.5, 0, Math.PI * 2);
        ctx.fill();

        // Star body — large, reddish
        const bodyGrad = ctx.createRadialGradient(centerX - starR*0.15, centerY - starR*0.15, 0, centerX, centerY, starR);
        bodyGrad.addColorStop(0, '#ffaa66');
        bodyGrad.addColorStop(0.5, star.type.color);
        bodyGrad.addColorStop(1, '#cc2200');
        ctx.fillStyle = bodyGrad;
        ctx.beginPath();
        ctx.arc(centerX, centerY, starR, 0, Math.PI * 2);
        ctx.fill();

        // Engulf zone indicator
        if (star.type.engulfZone) {
            const engulfR = getOrbitRadius(star.type.engulfZone, totalOrbits);
            ctx.strokeStyle = 'rgba(255,50,0,0.15)';
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 6]);
            ctx.beginPath();
            ctx.arc(centerX, centerY, engulfR, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = 'rgba(255,50,0,0.2)';
            ctx.font = '9px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('engulfed zone', centerX, centerY - engulfR - 4);
        }
    }
    // === STANDARD STARS (Red Dwarf, Yellow Sun, Blue Giant, White Dwarf, Brown Dwarf, Neutron) ===
    else {
        // Glow
        const glowGrad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, starR * 3);
        glowGrad.addColorStop(0, star.type.color + 'aa');
        glowGrad.addColorStop(0.4, star.type.color + '33');
        glowGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.arc(centerX, centerY, starR * 3, 0, Math.PI * 2);
        ctx.fill();

        // Star body
        ctx.fillStyle = star.type.color;
        ctx.beginPath();
        ctx.arc(centerX, centerY, starR, 0, Math.PI * 2);
        ctx.fill();

        // Inner glow
        const innerGrad = ctx.createRadialGradient(centerX - starR*0.2, centerY - starR*0.2, 0, centerX, centerY, starR);
        innerGrad.addColorStop(0, '#ffffff');
        innerGrad.addColorStop(0.5, star.type.color);
        innerGrad.addColorStop(1, star.type.color);
        ctx.fillStyle = innerGrad;
        ctx.beginPath();
        ctx.arc(centerX, centerY, starR, 0, Math.PI * 2);
        ctx.fill();
    }

    // Binary companion star (orbiting)
    if (star.type.id === 'binary' && star.companion) {
        const comp = star.companion;
        const compR = starR * comp.type.radius;
        const orbitDist = starR * 1.6;
        const compAngle = animationTime * 0.0006;
        const cx2 = centerX + Math.cos(compAngle) * orbitDist;
        const cy2 = centerY + Math.sin(compAngle) * orbitDist;

        // Companion orbit line
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 6]);
        ctx.beginPath();
        ctx.arc(centerX, centerY, orbitDist, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);

        // Companion glow
        const compGlow = ctx.createRadialGradient(cx2, cy2, 0, cx2, cy2, compR * 2.5);
        compGlow.addColorStop(0, comp.type.color + '88');
        compGlow.addColorStop(0.5, comp.type.color + '22');
        compGlow.addColorStop(1, 'transparent');
        ctx.fillStyle = compGlow;
        ctx.beginPath();
        ctx.arc(cx2, cy2, compR * 2.5, 0, Math.PI * 2);
        ctx.fill();

        // Companion body
        if (comp.type.id === 'black_hole') {
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(cx2, cy2, compR, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,100,50,0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(cx2, cy2, compR * 1.2, 0, Math.PI * 2);
            ctx.stroke();
        } else {
            const compBodyGrad = ctx.createRadialGradient(cx2 - compR*0.2, cy2 - compR*0.2, 0, cx2, cy2, compR);
            compBodyGrad.addColorStop(0, '#ffffff');
            compBodyGrad.addColorStop(0.5, comp.type.color);
            compBodyGrad.addColorStop(1, comp.type.color);
            ctx.fillStyle = compBodyGrad;
            ctx.beginPath();
            ctx.arc(cx2, cy2, compR, 0, Math.PI * 2);
            ctx.fill();
        }

        // Companion label
        ctx.fillStyle = '#888';
        ctx.font = '9px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText(comp.name, cx2, cy2 + compR + 12);
    }

    // Draw planets
    for (let pi = 0; pi < planets.length; pi++) {
        const planet = planets[pi];
        const pos = getPlanetScreenPos(planet, totalOrbits);
        const r = getPlanetRadius(planet);
        const isSelected = pi === selectedPlanetIndex;
        const isHovered = pi === hoveredPlanetIndex;

        // Planet shadow / glow
        if (isSelected) {
            ctx.strokeStyle = '#ffcc00';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, r + 5, 0, Math.PI * 2);
            ctx.stroke();
        } else if (isHovered) {
            ctx.strokeStyle = '#ffffff44';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, r + 4, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Planet body
        const planetGrad = ctx.createRadialGradient(pos.x - r*0.3, pos.y - r*0.3, 0, pos.x, pos.y, r);
        planetGrad.addColorStop(0, lightenColor(planet.type.color, 40));
        planetGrad.addColorStop(1, planet.type.color);
        ctx.fillStyle = planetGrad;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
        ctx.fill();

        // Rings for gas giants
        if (planet.type.id === 'gas_giant') {
            ctx.strokeStyle = planet.type.color + '88';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.ellipse(pos.x, pos.y, r * 1.8, r * 0.4, 0.3, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Life indicator dot
        if (planet.life.id !== 'none') {
            ctx.fillStyle = planet.life.color;
            ctx.beginPath();
            ctx.arc(pos.x + r + 3, pos.y - r - 3, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        // Moons
        if (planet.moonData) {
            for (let mi = 0; mi < planet.moonData.length; mi++) {
                const moon = planet.moonData[mi];
                const moonAngle = animationTime * 0.0004 + (mi * Math.PI * 2 / planet.moonData.length);
                const moonDist = r + 10 + mi * 6;
                const mx = pos.x + Math.cos(moonAngle) * moonDist;
                const my = pos.y + Math.sin(moonAngle) * moonDist;
                const moonR = Math.max(2.5, Math.log2(moon.sizeN + 1) * 1.5);

                const isMoonSelected = selectedMoon && selectedMoon.planetIndex === pi && selectedMoon.moonIndex === mi;
                const isMoonHovered = hoveredMoon && hoveredMoon.planetIndex === pi && hoveredMoon.moonIndex === mi;

                // Moon selection ring
                if (isMoonSelected) {
                    ctx.strokeStyle = '#ffcc00';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(mx, my, moonR + 3, 0, Math.PI * 2);
                    ctx.stroke();
                } else if (isMoonHovered) {
                    ctx.strokeStyle = '#ffffff66';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(mx, my, moonR + 3, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // Moon body
                ctx.fillStyle = moon.type.color;
                ctx.beginPath();
                ctx.arc(mx, my, moonR, 0, Math.PI * 2);
                ctx.fill();

                // Life indicator on moon
                if (moon.life.id !== 'none') {
                    ctx.fillStyle = moon.life.color;
                    ctx.beginPath();
                    ctx.arc(mx + moonR + 2, my - moonR - 2, 2, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Store screen position for hit testing
                moon._screenX = mx;
                moon._screenY = my;
                moon._screenR = moonR;
            }
        }

        // Planet label
        ctx.fillStyle = isSelected ? '#ffcc00' : '#888';
        ctx.font = '11px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText(planet.name, pos.x, pos.y + r + 16);
    }

    // Hab zone label
    if (star.type.habZone.length >= 2) {
        const labelR = getOrbitRadius(star.type.habZone[1] + 0.4, totalOrbits);
        ctx.fillStyle = 'rgba(80,180,80,0.3)';
        ctx.font = '10px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('habitable zone', centerX, centerY - labelR - 5);
    }

    // Star name
    ctx.fillStyle = star.type.color;
    ctx.font = 'bold 14px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(star.name, centerX, centerY + star.type.radius + 20);
}

function lightenColor(hex, amount) {
    let r = parseInt(hex.slice(1,3), 16);
    let g = parseInt(hex.slice(3,5), 16);
    let b = parseInt(hex.slice(5,7), 16);
    r = Math.min(255, r + amount);
    g = Math.min(255, g + amount);
    b = Math.min(255, b + amount);
    return `rgb(${r},${g},${b})`;
}

// ============================================================
// INTERACTION
// ============================================================
// Returns { type: 'planet', index } or { type: 'moon', planetIndex, moonIndex } or null
function hitTest(mx, my) {
    if (!systemData) return null;

    // Test moons first (smaller, on top of planets visually)
    for (let pi = 0; pi < systemData.planets.length; pi++) {
        const planet = systemData.planets[pi];
        if (!planet.moonData) continue;
        for (let mi = 0; mi < planet.moonData.length; mi++) {
            const moon = planet.moonData[mi];
            if (moon._screenX === undefined) continue;
            const dx = mx - moon._screenX, dy = my - moon._screenY;
            const hitR = Math.max(moon._screenR + 4, 8); // generous hit target for small moons
            if (dx*dx + dy*dy <= hitR*hitR) {
                return { type: 'moon', planetIndex: pi, moonIndex: mi };
            }
        }
    }

    // Test planets
    const totalOrbits = systemData.planets.length > 0 ?
        systemData.planets[systemData.planets.length - 1].orbit + 1 : 2;

    for (let pi = systemData.planets.length - 1; pi >= 0; pi--) {
        const planet = systemData.planets[pi];
        const pos = getPlanetScreenPos(planet, totalOrbits);
        const r = getPlanetRadius(planet) + 5;
        const dx = mx - pos.x, dy = my - pos.y;
        if (dx*dx + dy*dy <= r*r) return { type: 'planet', index: pi };
    }
    return null;
}

function onMouseMove(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const hit = hitTest(mx, my);

    hoveredPlanetIndex = -1;
    hoveredMoon = null;

    if (hit) {
        if (hit.type === 'planet') hoveredPlanetIndex = hit.index;
        else if (hit.type === 'moon') hoveredMoon = { planetIndex: hit.planetIndex, moonIndex: hit.moonIndex };
    }

    canvas.style.cursor = hit ? 'pointer' : 'crosshair';
}

function onClick(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const hit = hitTest(mx, my);

    if (hit) {
        if (hit.type === 'moon') {
            selectMoon(hit.planetIndex, hit.moonIndex);
        } else if (hit.type === 'planet') {
            selectedMoon = null;
            selectPlanet(hit.index);
        }
    }
}

function onDblClick(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const hit = hitTest(mx, my);

    if (hit) {
        if (hit.type === 'moon') {
            const moon = systemData.planets[hit.planetIndex].moonData[hit.moonIndex];
            landOnBody(moon);
        } else if (hit.type === 'planet' && systemData.planets[hit.index].type.landable) {
            landOnPlanet(hit.index);
        }
    }
}

function selectPlanet(index) {
    selectedPlanetIndex = index;
    const planet = systemData.planets[index];

    // Highlight in list
    document.querySelectorAll('.planet-list-item').forEach((el, i) => {
        el.classList.toggle('selected', i === index);
    });

    // Update detail panel
    const detail = document.getElementById('planet-detail');
    detail.classList.add('active');
    document.getElementById('pd-name').textContent = planet.name;
    document.getElementById('pd-id').textContent = planet.id;
    document.getElementById('pd-type').innerHTML = `<span style="color:${planet.type.color}">${planet.type.name}</span>`;
    document.getElementById('pd-orbit').textContent = `${planet.orbit}${planet.inHabZone ? ' (habitable zone)' : ''}`;
    document.getElementById('pd-size').textContent = planet.sizeN;
    document.getElementById('pd-tiles').textContent = planet.tileCount.toLocaleString();
    document.getElementById('pd-atmo').textContent = planet.type.atmosphere;
    document.getElementById('pd-life').innerHTML = `<span style="color:${planet.life.color}">${planet.life.name}</span>`;
    document.getElementById('pd-biomes').textContent = planet.type.biomes.join(', ');
    document.getElementById('pd-moons').textContent = planet.moons + (planet.stations ? ` (+${planet.stations} stations)` : '');

    const btnContainer = document.getElementById('pd-land-btn-container');
    if (planet.type.landable) {
        btnContainer.innerHTML = `<button class="btn primary" onclick="landOnPlanet(${index})">Land on ${planet.name}</button>`;
    } else {
        btnContainer.innerHTML = `<span class="stat" style="color:#884444;">Cannot land — ${planet.type.id === 'gas_giant' ? 'gas giant, visit stations/moons' : 'not landable'}</span>`;
    }
}

function selectMoon(planetIndex, moonIndex) {
    selectedMoon = { planetIndex, moonIndex };
    selectedPlanetIndex = -1;

    // Clear planet list selection
    document.querySelectorAll('.planet-list-item').forEach(el => el.classList.remove('selected'));

    const planet = systemData.planets[planetIndex];
    const moon = planet.moonData[moonIndex];

    const detail = document.getElementById('planet-detail');
    detail.classList.add('active');
    document.getElementById('pd-name').textContent = moon.name;
    document.getElementById('pd-id').textContent = moon.id;
    document.getElementById('pd-type').innerHTML = `<span style="color:${moon.type.color}">${moon.type.name}</span> <span style="color:#888">(moon of ${planet.name})</span>`;
    document.getElementById('pd-orbit').textContent = `Moon orbit ${moonIndex + 1} around ${planet.name}`;
    document.getElementById('pd-size').textContent = moon.sizeN;
    document.getElementById('pd-tiles').textContent = moon.tileCount.toLocaleString();
    document.getElementById('pd-atmo').textContent = moon.type.atmosphere;
    document.getElementById('pd-life').innerHTML = `<span style="color:${moon.life.color}">${moon.life.name}</span>`;
    document.getElementById('pd-biomes').textContent = moon.type.biomes.join(', ');
    document.getElementById('pd-moons').textContent = '—';

    const btnContainer = document.getElementById('pd-land-btn-container');
    btnContainer.innerHTML = `<button class="btn primary" onclick="landOnBody(systemData.planets[${planetIndex}].moonData[${moonIndex}])">Land on ${moon.name}</button>`;
}

function landOnBody(body) {
    const params = new URLSearchParams({
        seed: body.seed,
        n: body.sizeN,
        name: body.name,
        type: body.type.id,
        life: body.life.id,
        system: systemData.star.name,
        returnSeed: systemData.star.seed,
        bodyId: body.id
    });
    // Pass galaxy/system navigation context through to planet view
    if (urlReturnGalaxySeed) params.set('returnGalaxySeed', urlReturnGalaxySeed);
    if (urlGalaxy) params.set('galaxy', urlGalaxy);
    if (urlGalaxyId) params.set('galaxyId', urlGalaxyId);
    if (urlSystemId) params.set('systemId', urlSystemId);
    // Pass universe context through
    if (urlReturnUniverseSeed) params.set('returnUniverseSeed', urlReturnUniverseSeed);
    if (urlUniverse) params.set('universe', urlUniverse);
    if (urlUniverseId) params.set('universeId', urlUniverseId);
    window.location.href = `hex_globe.html?${params.toString()}`;
}

function landOnPlanet(index) {
    const planet = systemData.planets[index];
    if (!planet.type.landable) return;
    landOnBody(planet);
}

// ============================================================
// PLANET LIST
// ============================================================
function buildPlanetList() {
    const container = document.getElementById('planet-list');
    container.innerHTML = '';

    for (let pi = 0; pi < systemData.planets.length; pi++) {
        const planet = systemData.planets[pi];
        const r = getPlanetRadius(planet);

        const item = document.createElement('div');
        item.className = 'planet-list-item';
        item.onclick = () => selectPlanet(pi);

        const dot = document.createElement('div');
        dot.className = 'planet-dot';
        dot.style.width = Math.max(10, r) + 'px';
        dot.style.height = Math.max(10, r) + 'px';
        dot.style.background = planet.type.color;

        const info = document.createElement('div');
        info.className = 'planet-info-text';

        let tags = '';
        if (planet.type.landable) {
            tags += '<span class="tag tag-landable">Landable</span>';
        } else {
            tags += '<span class="tag tag-not-landable">No Landing</span>';
        }
        if (planet.life.id !== 'none') {
            tags += `<span class="tag tag-life-${planet.life.id}">${planet.life.name}</span>`;
        }

        info.innerHTML = `
            <div class="name">${planet.name}</div>
            <div class="type">${planet.type.name} · Orbit ${planet.orbit} · n=${planet.sizeN} (${planet.tileCount.toLocaleString()} tiles)${tags}</div>
        `;

        item.appendChild(dot);
        item.appendChild(info);
        container.appendChild(item);

        // Add moon sub-items
        if (planet.moonData && planet.moonData.length > 0) {
            for (let mi = 0; mi < planet.moonData.length; mi++) {
                const moon = planet.moonData[mi];
                const moonItem = document.createElement('div');
                moonItem.className = 'planet-list-item';
                moonItem.style.paddingLeft = '30px';
                moonItem.style.fontSize = '11px';
                moonItem.onclick = () => selectMoon(pi, mi);

                const moonDot = document.createElement('div');
                moonDot.className = 'planet-dot';
                moonDot.style.width = '8px';
                moonDot.style.height = '8px';
                moonDot.style.background = moon.type.color;

                const moonInfo = document.createElement('div');
                moonInfo.className = 'planet-info-text';

                let moonTags = '<span class="tag tag-landable">Landable</span>';
                if (moon.life.id !== 'none') {
                    moonTags += `<span class="tag tag-life-${moon.life.id}">${moon.life.name}</span>`;
                }

                moonInfo.innerHTML = `
                    <div class="name" style="font-size:12px">${moon.name}</div>
                    <div class="type">${moon.type.name} · n=${moon.sizeN} (${moon.tileCount.toLocaleString()} tiles)${moonTags}</div>
                `;

                moonItem.appendChild(moonDot);
                moonItem.appendChild(moonInfo);
                container.appendChild(moonItem);
            }
        }
    }
}

// ============================================================
// SYSTEM INFO
// ============================================================
function updateStarInfo() {
    const star = systemData.star;
    document.getElementById('star-name').textContent = star.name;
    document.getElementById('star-id').textContent = star.id;
    document.getElementById('star-type').innerHTML = `<span style="color:${star.type.color}">${star.type.name}</span>`;
    document.getElementById('star-luminosity').textContent = star.type.luminosity;
    document.getElementById('star-planet-count').textContent = systemData.planets.length;
    document.getElementById('star-hab-zone').textContent = star.type.habZone.length >= 2 ?
        `Orbits ${star.type.habZone[0]}–${star.type.habZone[1]}` : 'None';

    // Show companion info if binary
    let compInfo = document.getElementById('star-companion');
    if (!compInfo) {
        compInfo = document.createElement('div');
        compInfo.className = 'stat';
        compInfo.id = 'star-companion';
        document.getElementById('star-info').appendChild(compInfo);
    }
    if (star.companion) {
        compInfo.innerHTML = `Companion: <span style="color:${star.companion.type.color}">${star.companion.type.name}</span> (${star.companion.name})`;
        compInfo.style.display = '';
    } else {
        compInfo.style.display = 'none';
    }
}

// ============================================================
// GENERATION CONTROLS
// ============================================================
function regenerateSystem() {
    const seedInput = document.getElementById('seed-input');
    const seed = parseInt(seedInput.value) || 42;
    systemData = generateSystem(seed, urlSystemId);
    selectedPlanetIndex = -1;
    hoveredPlanetIndex = -1;
    selectedMoon = null;
    hoveredMoon = null;
    document.getElementById('planet-detail').classList.remove('active');
    updateStarInfo();
    buildPlanetList();
}

function randomSeed() {
    const seed = Math.floor(Math.random() * 999999) + 1;
    document.getElementById('seed-input').value = seed;
    regenerateSystem();
}

// ============================================================
// ANIMATION LOOP
// ============================================================
function animate(time) {
    animationTime = time;
    drawSystem();
    requestAnimationFrame(animate);
}

// ============================================================
// INIT
// ============================================================
initCanvas();

// Check for URL parameters
const urlParams = new URLSearchParams(window.location.search);
const urlSeed = urlParams.get('seed');
const urlGalaxy = urlParams.get('galaxy');
const urlGalaxyId = urlParams.get('galaxyId');
const urlSystemId = urlParams.get('systemId');
const urlReturnGalaxySeed = urlParams.get('returnGalaxySeed');
const urlUniverse = urlParams.get('universe');
const urlUniverseId = urlParams.get('universeId');
const urlReturnUniverseSeed = urlParams.get('returnUniverseSeed');

if (urlSeed) {
    document.getElementById('seed-input').value = urlSeed;
}

// Show back button and galaxy name if launched from galaxy view
if (urlReturnGalaxySeed) {
    document.getElementById('back-btn').style.display = 'block';
    if (urlGalaxy) {
        const header = document.querySelector('#info-panel h1');
        header.textContent = 'Star System View';
        const galaxyLabel = document.createElement('div');
        galaxyLabel.className = 'stat';
        galaxyLabel.innerHTML = `Galaxy: <span style="color:#ffcc00">${urlGalaxy}</span>`;
        header.after(galaxyLabel);
    }
}

function returnToGalaxy() {
    if (urlReturnGalaxySeed) {
        const params = new URLSearchParams({ seed: urlReturnGalaxySeed });
        // Preserve universe context for the back chain
        if (urlReturnUniverseSeed) params.set('returnUniverseSeed', urlReturnUniverseSeed);
        if (urlUniverse) params.set('universe', urlUniverse);
        if (urlUniverseId) params.set('universeId', urlUniverseId);
        // Re-derive galaxyCatalogId if we have universe context
        if (urlGalaxyId) params.set('galaxyCatalogId', urlGalaxyId);
        window.location.href = `galaxy_view.html?${params.toString()}`;
    } else {
        window.history.back();
    }
}

regenerateSystem();
requestAnimationFrame(animate);
</script>
