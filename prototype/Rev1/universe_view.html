<script>
// ============================================================
// SEEDED RANDOM
// ============================================================
class SeededRandom {
    constructor(seed) {
        this.seed = seed % 2147483647;
        if (this.seed <= 0) this.seed += 2147483646;
    }
    next() {
        this.seed = (this.seed * 16807) % 2147483647;
        return (this.seed - 1) / 2147483646;
    }
    nextInt(min, max) {
        return Math.floor(this.next() * (max - min + 1)) + min;
    }
    nextFloat(min, max) {
        return this.next() * (max - min) + min;
    }
    pick(arr) {
        return arr[Math.floor(this.next() * arr.length)];
    }
    weightedPick(items) {
        const total = items.reduce((s, i) => s + i.frequency, 0);
        let r = this.next() * total;
        for (const item of items) {
            r -= item.frequency;
            if (r <= 0) return item;
        }
        return items[items.length - 1];
    }
    gaussian() {
        const u1 = this.next();
        const u2 = this.next();
        return Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
    }
}

// ============================================================
// CONSTANTS
// ============================================================

// Must match galaxy_view.html GALAXY_TYPES exactly (order, count, arm ranges, system counts)
const GALAXY_VIEW_TYPES = [
    { id: 'spiral',     arms: [2,6],  systemCount: [200,500] },
    { id: 'barred',     arms: [2,4],  systemCount: [300,600] },
    { id: 'elliptical', arms: [0,0],  systemCount: [150,400] },
    { id: 'irregular',  arms: [0,0],  systemCount: [80,200] },
];

// Visual representation for each galaxy type at universe scale
const GALAXY_VISUAL_TYPES = [
    { id: 'spiral',     name: 'Spiral Galaxy',    color: '#88aaff', glowColor: '#4466cc' },
    { id: 'barred',     name: 'Barred Spiral',    color: '#99bbff', glowColor: '#5577dd' },
    { id: 'elliptical', name: 'Elliptical Galaxy', color: '#ffcc88', glowColor: '#cc9944' },
    { id: 'irregular',  name: 'Irregular Galaxy',  color: '#aaddaa', glowColor: '#66aa66' },
];

// Must match galaxy_view.html name arrays exactly
const GALAXY_NAMES_PREFIX = ['Andromeda','Celestia','Draconis','Elysia','Fornax','Galactica','Helios','Icarus','Jotunheim','Kronos','Lyra','Mithras','Nebula','Orion','Pandora','Quasar','Regulus','Solara','Tethys','Umbra','Valhalla','Wyrm','Xanadu','Yggdrasil','Zenith'];
const GALAXY_NAMES_SUFFIX = ['Expanse','Cluster','Nexus','Void','Reach','Dominion','Sector','Spiral','Drift','Wake'];

const CLUSTER_PREFIX = ['Abell','Coma','Perseus','Virgo','Centaurus','Hydra','Ophiuchus','Hercules','Norma','Fornax','Phoenix','Sculptor','Antlia','Boötes','Sagitta','Pavo','Dorado','Horologium'];
const CLUSTER_SUFFIX = ['Cluster','Supercluster','Group','Aggregate','Formation','Complex','Assembly','Convergence'];

const UNI_PREFIX = ['Eternal','Infinite','Primordial','Celestial','Cosmic','Astral','Grand','Boundless','Vast','Ancient','Luminous','Sovereign','Twilight','Radiant','Abyssal'];
const UNI_SUFFIX = ['Expanse','Continuum','Dominion','Realm','Tapestry','Lattice','Web','Horizon','Matrix','Firmament'];

// ============================================================
// PEEK GALAXY PROPERTIES (must match galaxy_view.html RNG sequence)
// ============================================================
function peekGalaxyProperties(galaxySeed) {
    const rng = new SeededRandom(galaxySeed);
    // Exact sequence from galaxy_view.html generateGalaxy():
    const typeIndex = rng.nextInt(0, GALAXY_VIEW_TYPES.length - 1);
    const gvType = GALAXY_VIEW_TYPES[typeIndex];
    const name = rng.pick(GALAXY_NAMES_PREFIX) + ' ' + rng.pick(GALAXY_NAMES_SUFFIX);
    // Conditional RNG call: only if arms[0] !== 0
    const armCount = gvType.arms[0] === 0 ? 0 : rng.nextInt(gvType.arms[0], gvType.arms[1]);
    const systemCount = rng.nextInt(gvType.systemCount[0], gvType.systemCount[1]);
    const smbhMass = rng.nextFloat(1, 40);
    // smbhName is derived deterministically from galaxy name
    const smbhActive = rng.next() < 0.3;
    return {
        type: GALAXY_VISUAL_TYPES[typeIndex],
        name: name,
        armCount: armCount,
        systemCount: systemCount,
        smbhMass: smbhMass,
        smbhActive: smbhActive,
        smbhName: name.split(' ')[0] + ' Singularity'
    };
}

// ============================================================
// COSMIC WEB GENERATION
// ============================================================
function buildCosmicWeb(clusters, rng) {
    const n = clusters.length;
    if (n <= 1) return [];

    // Prim's MST
    const inMST = new Array(n).fill(false);
    const edges = [];
    inMST[0] = true;

    for (let step = 0; step < n - 1; step++) {
        let bestDist = Infinity;
        let bestFrom = -1, bestTo = -1;
        for (let i = 0; i < n; i++) {
            if (!inMST[i]) continue;
            for (let j = 0; j < n; j++) {
                if (inMST[j]) continue;
                const dx = clusters[i].x - clusters[j].x;
                const dy = clusters[i].y - clusters[j].y;
                const d = Math.sqrt(dx * dx + dy * dy);
                if (d < bestDist) {
                    bestDist = d;
                    bestFrom = i;
                    bestTo = j;
                }
            }
        }
        if (bestTo >= 0) {
            inMST[bestTo] = true;
            edges.push([bestFrom, bestTo]);
        }
    }

    // Add extra edges (~40% more, shortest non-MST edges) for web connectivity
    const edgeSet = new Set(edges.map(e => `${Math.min(e[0],e[1])}-${Math.max(e[0],e[1])}`));
    const candidates = [];
    for (let i = 0; i < n; i++) {
        for (let j = i + 1; j < n; j++) {
            const key = `${i}-${j}`;
            if (!edgeSet.has(key)) {
                const dx = clusters[i].x - clusters[j].x;
                const dy = clusters[i].y - clusters[j].y;
                candidates.push({ from: i, to: j, dist: Math.sqrt(dx * dx + dy * dy) });
            }
        }
    }
    candidates.sort((a, b) => a.dist - b.dist);

    const extraCount = Math.ceil(edges.length * 0.4);
    for (let i = 0; i < Math.min(extraCount, candidates.length); i++) {
        edges.push([candidates[i].from, candidates[i].to]);
    }

    return edges;
}

// ============================================================
// UNIVERSE GENERATION
// ============================================================
function generateUniverse(seed) {
    const rng = new SeededRandom(seed);

    const universeName = rng.pick(UNI_PREFIX) + ' ' + rng.pick(UNI_SUFFIX);
    const universeId = `UNI-${String(seed).padStart(4, '0')}`;
    const universeRadius = 700;

    // Generate cluster centers with minimum distance constraint
    const clusterCount = rng.nextInt(8, 18);
    const clusters = [];

    for (let i = 0; i < clusterCount; i++) {
        let cx, cy, valid;
        let attempts = 0;
        do {
            cx = rng.nextFloat(-universeRadius * 0.8, universeRadius * 0.8);
            cy = rng.nextFloat(-universeRadius * 0.8, universeRadius * 0.8);
            valid = true;
            for (const existing of clusters) {
                const dist = Math.sqrt((cx - existing.x) ** 2 + (cy - existing.y) ** 2);
                if (dist < 120) { valid = false; break; }
            }
            attempts++;
        } while (!valid && attempts < 60);

        const clusterName = rng.pick(CLUSTER_PREFIX) + ' ' + rng.pick(CLUSTER_SUFFIX);
        const clusterId = `${universeId}:CL-${String(i).padStart(2, '0')}`;
        const galaxyCount = rng.nextInt(3, 15);
        const clusterRadius = rng.nextFloat(60, 150);

        clusters.push({
            x: cx, y: cy,
            name: clusterName,
            id: clusterId,
            galaxyCount: galaxyCount,
            radius: clusterRadius,
            index: i
        });
    }

    // Build cosmic web
    const edges = buildCosmicWeb(clusters, rng);

    // Generate galaxies
    const galaxies = [];
    let galIdx = 0;

    // Cluster galaxies
    for (const cluster of clusters) {
        for (let g = 0; g < cluster.galaxyCount; g++) {
            const angle = rng.nextFloat(0, Math.PI * 2);
            const dist = Math.abs(rng.gaussian()) * cluster.radius * 0.35;
            const galaxySeed = rng.nextInt(1, 999999);
            const props = peekGalaxyProperties(galaxySeed);

            galaxies.push({
                x: cluster.x + Math.cos(angle) * dist,
                y: cluster.y + Math.sin(angle) * dist,
                seed: galaxySeed,
                type: props.type,
                name: props.name,
                props: props,
                id: `${universeId}:GAL-${String(galIdx).padStart(3, '0')}`,
                cluster: cluster,
                isField: false,
                size: rng.nextFloat(10, 20),
                angle: rng.nextFloat(0, Math.PI * 2),
                index: galIdx
            });
            galIdx++;
        }
    }

    // Filament galaxies (along edges between clusters)
    for (const edge of edges) {
        const c1 = clusters[edge[0]];
        const c2 = clusters[edge[1]];
        const filCount = rng.nextInt(0, 4);
        for (let f = 0; f < filCount; f++) {
            const t = rng.nextFloat(0.2, 0.8);
            const perpAngle = Math.atan2(c2.y - c1.y, c2.x - c1.x) + Math.PI / 2;
            const perpDist = rng.gaussian() * 25;
            const galaxySeed = rng.nextInt(1, 999999);
            const props = peekGalaxyProperties(galaxySeed);

            galaxies.push({
                x: c1.x + (c2.x - c1.x) * t + Math.cos(perpAngle) * perpDist,
                y: c1.y + (c2.y - c1.y) * t + Math.sin(perpAngle) * perpDist,
                seed: galaxySeed,
                type: props.type,
                name: props.name,
                props: props,
                id: `${universeId}:GAL-${String(galIdx).padStart(3, '0')}`,
                cluster: null,
                isField: true,
                size: rng.nextFloat(7, 15),
                angle: rng.nextFloat(0, Math.PI * 2),
                index: galIdx
            });
            galIdx++;
        }
    }

    // Field galaxies (void galaxies — sparse, scattered)
    const fieldCount = rng.nextInt(5, 15);
    for (let f = 0; f < fieldCount; f++) {
        const galaxySeed = rng.nextInt(1, 999999);
        const props = peekGalaxyProperties(galaxySeed);

        galaxies.push({
            x: rng.nextFloat(-universeRadius * 0.9, universeRadius * 0.9),
            y: rng.nextFloat(-universeRadius * 0.9, universeRadius * 0.9),
            seed: galaxySeed,
            type: props.type,
            name: props.name,
            props: props,
            id: `${universeId}:GAL-${String(galIdx).padStart(3, '0')}`,
            cluster: null,
            isField: true,
            size: rng.nextFloat(5, 12),
            angle: rng.nextFloat(0, Math.PI * 2),
            index: galIdx
        });
        galIdx++;
    }

    return {
        name: universeName,
        id: universeId,
        seed: seed,
        clusters: clusters,
        galaxies: galaxies,
        edges: edges,
        universeRadius: universeRadius
    };
}

// ============================================================
// GALAXY ICON RENDERING
// ============================================================
function drawSpiralIcon(ctx, size, type, seed) {
    const armRng = new SeededRandom(seed);
    const arms = armRng.nextInt(2, 4);
    for (let arm = 0; arm < arms; arm++) {
        ctx.beginPath();
        const armStart = (arm * Math.PI * 2) / arms;
        for (let t = 0.05; t < 1; t += 0.03) {
            const r = t * size * 0.85;
            const a = armStart + t * 3.2;
            const px = Math.cos(a) * r;
            const py = Math.sin(a) * r;
            if (t <= 0.05) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.strokeStyle = type.color + '70';
        ctx.lineWidth = Math.max(1, size * 0.1);
        ctx.stroke();
    }
    // Core
    const cg = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.22);
    cg.addColorStop(0, '#ffffffcc');
    cg.addColorStop(0.6, type.color + 'aa');
    cg.addColorStop(1, type.color + '00');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.22, 0, Math.PI * 2);
    ctx.fill();
}

function drawBarredSpiralIcon(ctx, size, type) {
    // Central bar
    ctx.strokeStyle = type.color + '88';
    ctx.lineWidth = Math.max(1.5, size * 0.14);
    ctx.beginPath();
    ctx.moveTo(-size * 0.3, 0);
    ctx.lineTo(size * 0.3, 0);
    ctx.stroke();
    // Arms curving from bar ends
    for (let arm = 0; arm < 2; arm++) {
        ctx.beginPath();
        const startAngle = arm * Math.PI;
        for (let t = 0.15; t < 1; t += 0.03) {
            const r = t * size * 0.8;
            const a = startAngle + t * 2.8;
            const px = Math.cos(a) * r;
            const py = Math.sin(a) * r;
            if (t <= 0.15) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.strokeStyle = type.color + '60';
        ctx.lineWidth = Math.max(1, size * 0.09);
        ctx.stroke();
    }
    // Core
    const cg = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.18);
    cg.addColorStop(0, '#ffffffcc');
    cg.addColorStop(0.5, type.color + 'aa');
    cg.addColorStop(1, type.color + '00');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.18, 0, Math.PI * 2);
    ctx.fill();
}

function drawEllipticalIcon(ctx, size, type) {
    const eg = ctx.createRadialGradient(0, 0, 0, 0, 0, size);
    eg.addColorStop(0, type.color + 'dd');
    eg.addColorStop(0.25, type.color + '88');
    eg.addColorStop(0.55, type.color + '33');
    eg.addColorStop(1, 'transparent');
    ctx.fillStyle = eg;
    ctx.beginPath();
    ctx.ellipse(0, 0, size, size * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();
}

function drawIrregularIcon(ctx, size, type, seed) {
    const br = new SeededRandom(seed);
    const blobCount = br.nextInt(4, 7);
    for (let b = 0; b < blobCount; b++) {
        const bx = br.nextFloat(-size * 0.45, size * 0.45);
        const by = br.nextFloat(-size * 0.35, size * 0.35);
        const bRadius = br.nextFloat(size * 0.12, size * 0.3);
        const bg = ctx.createRadialGradient(bx, by, 0, bx, by, bRadius);
        bg.addColorStop(0, type.color + '99');
        bg.addColorStop(1, 'transparent');
        ctx.fillStyle = bg;
        ctx.beginPath();
        ctx.arc(bx, by, bRadius, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawGalaxyIcon(ctx, screenX, screenY, galaxy, isSelected, isHovered) {
    const s = galaxy.size * Math.max(0.5, Math.min(2.5, viewScale * 0.6));
    const type = galaxy.type;

    // Outer glow
    const glowR = s * 2.5;
    const glow = ctx.createRadialGradient(screenX, screenY, 0, screenX, screenY, glowR);
    glow.addColorStop(0, type.glowColor + '25');
    glow.addColorStop(0.6, type.glowColor + '08');
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(screenX, screenY, glowR, 0, Math.PI * 2);
    ctx.fill();

    // Selection/hover ring
    if (isSelected) {
        ctx.strokeStyle = '#cc99ff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(screenX, screenY, s + 8, 0, Math.PI * 2);
        ctx.stroke();
        const selGlow = ctx.createRadialGradient(screenX, screenY, 0, screenX, screenY, s + 14);
        selGlow.addColorStop(0, type.color + '33');
        selGlow.addColorStop(1, 'transparent');
        ctx.fillStyle = selGlow;
        ctx.beginPath();
        ctx.arc(screenX, screenY, s + 14, 0, Math.PI * 2);
        ctx.fill();
    } else if (isHovered) {
        ctx.strokeStyle = '#ffffff33';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(screenX, screenY, s + 6, 0, Math.PI * 2);
        ctx.stroke();
    }

    // Draw galaxy shape
    ctx.save();
    ctx.translate(screenX, screenY);
    ctx.rotate(galaxy.angle);

    switch (type.id) {
        case 'spiral':     drawSpiralIcon(ctx, s, type, galaxy.seed); break;
        case 'barred':     drawBarredSpiralIcon(ctx, s, type); break;
        case 'elliptical': drawEllipticalIcon(ctx, s, type); break;
        case 'irregular':  drawIrregularIcon(ctx, s, type, galaxy.seed); break;
    }

    ctx.restore();

    // Name label
    if (viewScale > 0.6 || isSelected || isHovered) {
        ctx.fillStyle = isSelected ? '#cc99ff' : (isHovered ? '#ddd' : '#555');
        ctx.font = isSelected ? 'bold 11px Courier New' : '10px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText(galaxy.name, screenX, screenY + s + 14);
        if (isSelected && galaxy.props) {
            ctx.fillStyle = '#666';
            ctx.font = '9px Courier New';
            ctx.fillText(`${galaxy.type.name} · ${galaxy.props.systemCount} systems`, screenX, screenY + s + 26);
        }
    }
}

// ============================================================
// CANVAS
// ============================================================
let canvas, ctx, minimapCanvas, minimapCtx;
let universeData = null;
let selectedGalaxyIndex = -1;
let hoveredGalaxyIndex = -1;
let selectedClusterIndex = -1;
let hoveredClusterIndex = -1;
let canvasWidth, canvasHeight;

let viewX = 0, viewY = 0;
let viewScale = 0.8;

function initCanvas() {
    canvas = document.getElementById('universeCanvas');
    ctx = canvas.getContext('2d');
    minimapCanvas = document.getElementById('minimap');
    minimapCtx = minimapCanvas.getContext('2d');
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    canvas.addEventListener('mousemove', onMouseMove);
    canvas.addEventListener('click', onClick);
    canvas.addEventListener('dblclick', onDblClick);
    canvas.addEventListener('wheel', onWheel, { passive: false });

    let isDragging = false;
    let dragStartX, dragStartY;
    canvas.addEventListener('mousedown', (e) => {
        isDragging = true;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        canvas.style.cursor = 'grabbing';
    });
    canvas.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        viewX -= (e.clientX - dragStartX) / viewScale;
        viewY -= (e.clientY - dragStartY) / viewScale;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        drawUniverse();
        drawMinimap();
    });
    canvas.addEventListener('mouseup', () => { isDragging = false; canvas.style.cursor = 'crosshair'; });
    canvas.addEventListener('mouseleave', () => { isDragging = false; canvas.style.cursor = 'crosshair'; });
}

function resizeCanvas() {
    const container = document.getElementById('canvas-container');
    canvasWidth = container.clientWidth;
    canvasHeight = container.clientHeight;
    canvas.width = canvasWidth;
    canvas.height = canvasHeight;
    minimapCanvas.width = 150;
    minimapCanvas.height = 150;
    if (universeData) { drawUniverse(); drawMinimap(); }
}

function worldToScreen(wx, wy) {
    return {
        x: (wx - viewX) * viewScale + canvasWidth / 2,
        y: (wy - viewY) * viewScale + canvasHeight / 2
    };
}
function screenToWorld(sx, sy) {
    return {
        x: (sx - canvasWidth / 2) / viewScale + viewX,
        y: (sy - canvasHeight / 2) / viewScale + viewY
    };
}

// ============================================================
// MAIN RENDER
// ============================================================
function drawUniverse() {
    if (!universeData) return;
    const { clusters, galaxies, edges, universeRadius } = universeData;

    ctx.clearRect(0, 0, canvasWidth, canvasHeight);

    // Deep space background starfield
    const bgRng = new SeededRandom(77777);
    for (let i = 0; i < 400; i++) {
        const sx = bgRng.next() * canvasWidth;
        const sy = bgRng.next() * canvasHeight;
        const sr = bgRng.next() * 0.6;
        ctx.globalAlpha = bgRng.nextFloat(0.05, 0.2);
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Cosmic web filaments
    for (const edge of edges) {
        const c1 = clusters[edge[0]];
        const c2 = clusters[edge[1]];
        const p1 = worldToScreen(c1.x, c1.y);
        const p2 = worldToScreen(c2.x, c2.y);

        // Cull off-screen
        if (p1.x < -200 && p2.x < -200) continue;
        if (p1.x > canvasWidth + 200 && p2.x > canvasWidth + 200) continue;
        if (p1.y < -200 && p2.y < -200) continue;
        if (p1.y > canvasHeight + 200 && p2.y > canvasHeight + 200) continue;

        // Wide glow
        ctx.strokeStyle = 'rgba(80, 60, 140, 0.06)';
        ctx.lineWidth = Math.max(2, 18 * viewScale);
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();

        // Medium glow
        ctx.strokeStyle = 'rgba(100, 80, 170, 0.1)';
        ctx.lineWidth = Math.max(1, 6 * viewScale);
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();

        // Core filament
        ctx.strokeStyle = 'rgba(140, 120, 220, 0.08)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
    }

    // Cluster halos
    for (let ci = 0; ci < clusters.length; ci++) {
        const cluster = clusters[ci];
        const pos = worldToScreen(cluster.x, cluster.y);
        const r = cluster.radius * viewScale;

        if (r < 3) continue;
        if (pos.x < -r - 50 || pos.x > canvasWidth + r + 50 || pos.y < -r - 50 || pos.y > canvasHeight + r + 50) continue;

        const isSelCl = ci === selectedClusterIndex;
        const isHovCl = ci === hoveredClusterIndex;

        // Halo glow
        const haloGrad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, r);
        haloGrad.addColorStop(0, 'rgba(110, 80, 170, 0.05)');
        haloGrad.addColorStop(0.6, 'rgba(80, 60, 140, 0.025)');
        haloGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = haloGrad;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
        ctx.fill();

        // Boundary ring
        ctx.strokeStyle = isSelCl ? 'rgba(200,150,255,0.3)' : (isHovCl ? 'rgba(160,130,220,0.15)' : 'rgba(120,100,180,0.06)');
        ctx.lineWidth = isSelCl ? 1.5 : 1;
        ctx.setLineDash([5, 10]);
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);

        // Cluster label
        if (viewScale > 0.35 || isSelCl || isHovCl) {
            ctx.fillStyle = isSelCl ? 'rgba(200,160,255,0.6)' : (isHovCl ? 'rgba(180,150,230,0.4)' : 'rgba(150,130,200,0.2)');
            ctx.font = isSelCl ? 'bold 11px Courier New' : '10px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText(cluster.name, pos.x, pos.y - r - 8);
        }
    }

    // Region grid (8×8)
    const gridSize = universeRadius * 2 / 8;
    ctx.strokeStyle = 'rgba(255,255,255,0.025)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 8; i++) {
        const wx = -universeRadius + i * gridSize;
        const p1 = worldToScreen(wx, -universeRadius);
        const p2 = worldToScreen(wx, universeRadius);
        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();

        const wy = -universeRadius + i * gridSize;
        const p3 = worldToScreen(-universeRadius, wy);
        const p4 = worldToScreen(universeRadius, wy);
        ctx.beginPath(); ctx.moveTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y); ctx.stroke();
    }
    // Region labels
    if (viewScale > 0.35) {
        ctx.font = '9px Courier New';
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.textAlign = 'center';
        for (let sx = 0; sx < 8; sx++) {
            for (let sy = 0; sy < 8; sy++) {
                const wx = -universeRadius + (sx + 0.5) * gridSize;
                const wy = -universeRadius + (sy + 0.5) * gridSize;
                const p = worldToScreen(wx, wy);
                if (p.x > -50 && p.x < canvasWidth + 50 && p.y > -50 && p.y < canvasHeight + 50) {
                    ctx.fillText(`${String.fromCharCode(65 + sx)}-${sy + 1}`, p.x, p.y);
                }
            }
        }
    }

    // Draw galaxies
    for (let gi = 0; gi < galaxies.length; gi++) {
        const gal = galaxies[gi];
        const pos = worldToScreen(gal.x, gal.y);

        if (pos.x < -40 || pos.x > canvasWidth + 40 || pos.y < -40 || pos.y > canvasHeight + 40) continue;

        const isSelected = gi === selectedGalaxyIndex;
        const isHovered = gi === hoveredGalaxyIndex;

        drawGalaxyIcon(ctx, pos.x, pos.y, gal, isSelected, isHovered);
    }

    // Universe name overlay
    ctx.fillStyle = 'rgba(200,150,255,0.25)';
    ctx.font = 'bold 14px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText(universeData.name, 60, 30);
    ctx.font = '11px Courier New';
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillText(`${galaxies.length} galaxies · ${clusters.length} clusters · zoom: ${viewScale.toFixed(1)}x`, 60, 46);
}

// ============================================================
// MINIMAP
// ============================================================
function drawMinimap() {
    if (!universeData) return;
    const { clusters, galaxies, edges, universeRadius } = universeData;
    const w = 150, h = 150;
    const mmCtx = minimapCtx;

    mmCtx.clearRect(0, 0, w, h);
    mmCtx.fillStyle = 'rgba(6,6,18,0.9)';
    mmCtx.fillRect(0, 0, w, h);

    const scale = (w - 10) / (universeRadius * 2);
    const ox = 5, oy = 5;

    // Filaments
    mmCtx.strokeStyle = 'rgba(100,80,160,0.15)';
    mmCtx.lineWidth = 1;
    for (const edge of edges) {
        const c1 = clusters[edge[0]];
        const c2 = clusters[edge[1]];
        const x1 = (c1.x + universeRadius) * scale + ox;
        const y1 = (c1.y + universeRadius) * scale + oy;
        const x2 = (c2.x + universeRadius) * scale + ox;
        const y2 = (c2.y + universeRadius) * scale + oy;
        mmCtx.beginPath();
        mmCtx.moveTo(x1, y1);
        mmCtx.lineTo(x2, y2);
        mmCtx.stroke();
    }

    // Galaxies as tiny dots
    for (const gal of galaxies) {
        const mx = (gal.x + universeRadius) * scale + ox;
        const my = (gal.y + universeRadius) * scale + oy;
        mmCtx.fillStyle = gal.type.color + '66';
        mmCtx.beginPath();
        mmCtx.arc(mx, my, 1.2, 0, Math.PI * 2);
        mmCtx.fill();
    }

    // Cluster centers
    for (const cl of clusters) {
        const mx = (cl.x + universeRadius) * scale + ox;
        const my = (cl.y + universeRadius) * scale + oy;
        mmCtx.strokeStyle = 'rgba(160,130,220,0.2)';
        mmCtx.lineWidth = 0.5;
        mmCtx.beginPath();
        mmCtx.arc(mx, my, cl.radius * scale, 0, Math.PI * 2);
        mmCtx.stroke();
    }

    // Viewport rectangle
    const topLeft = screenToWorld(0, 0);
    const bottomRight = screenToWorld(canvasWidth, canvasHeight);
    const vx1 = (topLeft.x + universeRadius) * scale + ox;
    const vy1 = (topLeft.y + universeRadius) * scale + oy;
    const vx2 = (bottomRight.x + universeRadius) * scale + ox;
    const vy2 = (bottomRight.y + universeRadius) * scale + oy;

    mmCtx.strokeStyle = '#cc99ff';
    mmCtx.lineWidth = 1;
    mmCtx.strokeRect(vx1, vy1, vx2 - vx1, vy2 - vy1);
}

// ============================================================
// INTERACTION
// ============================================================
function hitTest(mx, my) {
    if (!universeData) return null;
    const world = screenToWorld(mx, my);

    // Check galaxies first (higher priority)
    let closest = null;
    let closestDist = Infinity;
    for (let i = 0; i < universeData.galaxies.length; i++) {
        const gal = universeData.galaxies[i];
        const dx = world.x - gal.x;
        const dy = world.y - gal.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const hitR = (gal.size + 6) / viewScale;
        if (dist < hitR && dist < closestDist) {
            closest = { type: 'galaxy', index: i };
            closestDist = dist;
        }
    }
    if (closest) return closest;

    // Check clusters
    for (let i = 0; i < universeData.clusters.length; i++) {
        const cl = universeData.clusters[i];
        const dx = world.x - cl.x;
        const dy = world.y - cl.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < cl.radius) {
            return { type: 'cluster', index: i };
        }
    }
    return null;
}

function onMouseMove(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const hit = hitTest(mx, my);

    hoveredGalaxyIndex = -1;
    hoveredClusterIndex = -1;

    if (hit) {
        if (hit.type === 'galaxy') hoveredGalaxyIndex = hit.index;
        else if (hit.type === 'cluster') hoveredClusterIndex = hit.index;
    }

    canvas.style.cursor = hit ? 'pointer' : 'crosshair';
    drawUniverse();
}

function onClick(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const hit = hitTest(mx, my);

    if (hit) {
        if (hit.type === 'galaxy') {
            selectedClusterIndex = -1;
            selectGalaxy(hit.index);
        } else if (hit.type === 'cluster') {
            selectedGalaxyIndex = -1;
            selectCluster(hit.index);
        }
    }
}

function onDblClick(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const hit = hitTest(mx, my);

    if (hit && hit.type === 'galaxy') {
        enterGalaxy(hit.index);
    }
}

function onWheel(e) {
    e.preventDefault();
    const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
    const newScale = Math.max(0.12, Math.min(4, viewScale * zoomFactor));

    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const worldBefore = screenToWorld(mx, my);

    viewScale = newScale;

    const worldAfter = screenToWorld(mx, my);
    viewX -= (worldAfter.x - worldBefore.x);
    viewY -= (worldAfter.y - worldBefore.y);

    drawUniverse();
    drawMinimap();
}

function zoomIn() { viewScale = Math.min(4, viewScale * 1.3); drawUniverse(); drawMinimap(); }
function zoomOut() { viewScale = Math.max(0.12, viewScale * 0.7); drawUniverse(); drawMinimap(); }
function resetView() { viewX = 0; viewY = 0; viewScale = 0.8; drawUniverse(); drawMinimap(); }

// ============================================================
// SELECTION & DETAIL
// ============================================================
function selectGalaxy(index) {
    selectedGalaxyIndex = index;
    selectedClusterIndex = -1;
    const gal = universeData.galaxies[index];

    // Highlight in list
    document.querySelectorAll('.galaxy-list-item').forEach(el => {
        el.classList.toggle('selected', parseInt(el.dataset.index) === index);
    });

    // Update detail panel
    const detail = document.getElementById('galaxy-detail');
    detail.classList.add('active');
    document.getElementById('detail-header').textContent = 'Selected Galaxy';
    document.getElementById('gd-name').textContent = gal.name;
    document.getElementById('gd-id').textContent = gal.id;
    document.getElementById('gd-type').innerHTML = `<span style="color:${gal.type.color}">${gal.type.name}</span>`;
    document.getElementById('gd-systems').textContent = gal.props ? gal.props.systemCount : '—';
    document.getElementById('gd-arms').textContent = gal.props ? (gal.props.armCount > 0 ? gal.props.armCount : 'N/A') : '—';
    document.getElementById('gd-cluster').textContent = gal.cluster ? gal.cluster.name : 'Field Galaxy (void)';
    document.getElementById('gd-smbh').innerHTML = gal.props
        ? `<span style="color:#ff8844">${gal.props.smbhName}</span> (${gal.props.smbhMass.toFixed(1)}B M☉${gal.props.smbhActive ? ', <span style="color:#ff6622">Active</span>' : ''})`
        : '—';

    const btnContainer = document.getElementById('gd-enter-container');
    btnContainer.innerHTML = `<button class="btn primary" onclick="enterGalaxy(${index})">Enter ${gal.name}</button>`;

    drawUniverse();
}

function selectCluster(index) {
    selectedClusterIndex = index;
    selectedGalaxyIndex = -1;
    const cluster = universeData.clusters[index];

    document.querySelectorAll('.galaxy-list-item').forEach(el => el.classList.remove('selected'));

    // Count stats
    const clusterGalaxies = universeData.galaxies.filter(g => g.cluster && g.cluster.index === index);
    const totalSystems = clusterGalaxies.reduce((s, g) => s + (g.props ? g.props.systemCount : 0), 0);

    const detail = document.getElementById('galaxy-detail');
    detail.classList.add('active');
    document.getElementById('detail-header').textContent = 'Selected Cluster';
    document.getElementById('gd-name').textContent = cluster.name;
    document.getElementById('gd-id').textContent = cluster.id;
    document.getElementById('gd-type').innerHTML = `<span style="color:#aa88dd">Galaxy Cluster</span>`;
    document.getElementById('gd-systems').textContent = `${totalSystems} (across ${clusterGalaxies.length} galaxies)`;
    document.getElementById('gd-arms').textContent = '—';
    document.getElementById('gd-cluster').textContent = `${clusterGalaxies.length} member galaxies`;
    document.getElementById('gd-smbh').textContent = '—';

    const btnContainer = document.getElementById('gd-enter-container');
    btnContainer.innerHTML = '';

    // Pan to cluster
    viewX = cluster.x;
    viewY = cluster.y;
    drawUniverse();
    drawMinimap();
}

function enterGalaxy(index) {
    const gal = universeData.galaxies[index];
    const params = new URLSearchParams({
        seed: gal.seed,
        universe: universeData.name,
        universeId: universeData.id,
        galaxyCatalogId: gal.id,
        returnUniverseSeed: universeData.seed
    });
    window.location.href = `galaxy_view.html?${params.toString()}`;
}

// ============================================================
// GALAXY LIST
// ============================================================
let allListItems = [];

function buildGalaxyList() {
    const container = document.getElementById('galaxy-list');
    container.innerHTML = '';
    allListItems = [];

    // Group by cluster
    const clusterMap = new Map();
    const fieldGalaxies = [];

    for (const gal of universeData.galaxies) {
        if (gal.cluster) {
            if (!clusterMap.has(gal.cluster.index)) clusterMap.set(gal.cluster.index, []);
            clusterMap.get(gal.cluster.index).push(gal);
        } else {
            fieldGalaxies.push(gal);
        }
    }

    // Render clustered galaxies
    for (const [ci, gals] of clusterMap) {
        const cluster = universeData.clusters[ci];
        const header = document.createElement('div');
        header.className = 'cluster-header';
        header.textContent = `${cluster.name} (${gals.length})`;
        header.style.cursor = 'pointer';
        header.onclick = () => {
            selectCluster(ci);
        };
        container.appendChild(header);

        for (const gal of gals.sort((a, b) => a.name.localeCompare(b.name))) {
            container.appendChild(createGalaxyListItem(gal));
        }
    }

    // Field galaxies
    if (fieldGalaxies.length > 0) {
        const header = document.createElement('div');
        header.className = 'cluster-header';
        header.textContent = `Field Galaxies (${fieldGalaxies.length})`;
        container.appendChild(header);
        for (const gal of fieldGalaxies.sort((a, b) => a.name.localeCompare(b.name))) {
            container.appendChild(createGalaxyListItem(gal));
        }
    }
}

function createGalaxyListItem(gal) {
    const item = document.createElement('div');
    item.className = 'galaxy-list-item';
    item.dataset.index = gal.index;
    item.dataset.name = gal.name.toLowerCase();
    item.onclick = () => {
        selectGalaxy(gal.index);
        viewX = gal.x;
        viewY = gal.y;
        drawUniverse();
        drawMinimap();
    };

    const dot = document.createElement('div');
    dot.className = 'galaxy-dot';
    dot.style.width = '12px';
    dot.style.height = '12px';
    dot.style.background = `radial-gradient(circle, ${gal.type.color}, ${gal.type.glowColor}44)`;

    const info = document.createElement('div');
    info.className = 'galaxy-info-text';

    let tags = '';
    if (gal.cluster) tags += `<span class="tag tag-cluster">${gal.cluster.name.split(' ')[0]}</span>`;
    else tags += '<span class="tag tag-field">Field</span>';
    if (gal.props && gal.props.smbhActive) tags += '<span class="tag tag-active">AGN</span>';

    info.innerHTML = `
        <div class="name">${gal.name}</div>
        <div class="type">${gal.type.name} · ${gal.props ? gal.props.systemCount : '?'} systems${tags}</div>
    `;

    item.appendChild(dot);
    item.appendChild(info);
    allListItems.push(item);
    return item;
}

function filterGalaxies() {
    const query = document.getElementById('search-input').value.toLowerCase();
    for (const item of allListItems) {
        const match = !query || item.dataset.name.includes(query);
        item.style.display = match ? 'flex' : 'none';
    }
    // Also show/hide cluster headers
    const headers = document.querySelectorAll('.cluster-header');
    if (query) {
        headers.forEach(h => h.style.display = 'none');
    } else {
        headers.forEach(h => h.style.display = 'block');
    }
}

// ============================================================
// UNIVERSE INFO
// ============================================================
function updateUniverseInfo() {
    const { galaxies, clusters, edges } = universeData;
    document.getElementById('uni-name').textContent = universeData.name;
    document.getElementById('uni-id').textContent = universeData.id;
    document.getElementById('uni-galaxy-count').textContent = galaxies.length;
    document.getElementById('uni-cluster-count').textContent = clusters.length;
    document.getElementById('uni-filament-count').textContent = edges.length;
    const totalSystems = galaxies.reduce((s, g) => s + (g.props ? g.props.systemCount : 0), 0);
    document.getElementById('uni-system-count').textContent = totalSystems.toLocaleString();
}

// ============================================================
// GENERATION & INIT
// ============================================================
function regenerateUniverse() {
    const seed = parseInt(document.getElementById('seed-input').value) || 1;
    universeData = generateUniverse(seed);
    selectedGalaxyIndex = -1;
    hoveredGalaxyIndex = -1;
    selectedClusterIndex = -1;
    hoveredClusterIndex = -1;
    document.getElementById('galaxy-detail').classList.remove('active');
    document.getElementById('search-input').value = '';
    viewX = 0;
    viewY = 0;
    viewScale = 0.8;
    updateUniverseInfo();
    buildGalaxyList();
    drawUniverse();
    drawMinimap();
}

function randomSeed() {
    document.getElementById('seed-input').value = Math.floor(Math.random() * 999999) + 1;
    regenerateUniverse();
}

// Init
initCanvas();
regenerateUniverse();
</script>
</body>
</html>
